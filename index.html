<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- キャッシュ無効化メタタグ -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Stock Value & Timing Analyzer</title>
  
  <!-- Google Fonts: Inter & Orbitron & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Chart.js & Lightweight Charts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
  
  <style>
    :root {
      --bg-dark: #0f172a; /* 深みのある紺色・黒 */
      --bg-card: rgba(30, 41, 59, 0.7); /* 2枚目の画像に近い青いカード背景 */
      --bg-sidebar: #0f172a; /* やや暗い紺色のサイドバー */
      --border-color: rgba(255, 255, 255, 0.1); /* はっきりとした境界線 */
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-teal: #38bdf8; /* アクセントブルー（空色） */
      --accent-green: #10b981; /* TradingViewグリーン */
      --accent-gold: #fbbf24; /* プレミアムゴールド */
      --accent-red: #ef4444; /* TradingViewレッド */
      --radius-lg: 12px;
      --radius-md: 8px;
      --radius-sm: 4px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
    }

    /* Layout */
    #app {
      display: flex;
      width: 100vw;
      min-height: 100vh;
      position: relative;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100;
      transition: var(--transition);
    }

    .sidebar-logo {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .logo-main {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent-teal), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: block;
    }

    .sidebar-nav {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .nav-item {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      width: 100%;
    }

    .nav-item:hover, .nav-item.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-item.active {
      border-left: 3px solid var(--accent-teal);
      background: rgba(56, 189, 248, 0.08);
      color: var(--accent-teal);
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      stroke-width: 1.5;
    }

    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 24px;
      min-height: 100vh;
      transition: var(--transition);
    }

    /* Cards & Glassmorphism */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      transition: var(--transition);
      margin-bottom: 20px;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* Tables */
    .main-table-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .table-container {
      overflow-x: auto;
      width: 100%;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .data-table th, .data-table td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-color);
    }

    .data-table th {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.2);
    }

    .data-table tbody tr {
      transition: var(--transition);
    }

    .data-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .animate-row {
      animation: fadeInRow 0.35s ease forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes fadeInRow {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-teal), var(--accent-green));
      color: #050508;
    }

    .btn-primary:hover {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-danger {
      background: rgba(239, 83, 80, 0.15);
      color: var(--accent-red);
      border: 1px solid rgba(239, 83, 80, 0.3);
    }

    .btn-danger:hover {
      background: var(--accent-red);
      color: #fff;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 11px;
    }

    /* Filter / Search Bar */
    .filter-bar-container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      background: rgba(18, 20, 32, 0.4);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 20px;
    }

    .filter-item-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-item-wrap span {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .styled-input {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      transition: var(--transition);
    }

    .styled-input:focus {
      border-color: var(--accent-teal);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
    }

    .select-wrapper {
      position: relative;
    }

    .styled-select {
      background: #111827;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 8px 32px 8px 12px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      color-scheme: dark;
      transition: var(--transition);
    }

    .styled-select option {
      background: #111827;
      color: var(--text-primary);
    }

    .styled-select:focus {
      border-color: var(--accent-teal);
    }

    .select-wrapper::after {
      content: '▼';
      font-size: 8px;
      color: var(--text-secondary);
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* Toggle Switch */
    .toggle {
      width: 40px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: var(--transition);
    }

    .toggle::after {
      content: '';
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      left: 2px;
      top: 2px;
      transition: var(--transition);
    }

    .toggle.on {
      background: var(--accent-teal);
    }

    .toggle.on::after {
      left: 22px;
    }

    /* Badges & Scores */
    .dip-badge-premium {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.25);
      padding: 4px 10px;
      border-radius: 20px;
      color: var(--accent-green);
      font-weight: 700;
      font-size: 11px;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
    }

    .dip-icon-badge {
      width: 12px;
      height: 12px;
    }

    .dip-text-wrap {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .dip-text-sub {
      font-size: 8px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .ai-insight-card:hover,
    .ai-insight-card:focus-visible {
      border-color: rgba(56, 189, 248, 0.45) !important;
      background: rgba(15, 23, 42, 0.72) !important;
      transform: translateY(-1px);
      outline: none;
    }

    .score-progress-container {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .score-progress-bar {
      height: 6px;
      background: var(--accent-teal);
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
    }

    .score-progress-track {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
    }

    .score-progress-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      width: 40px;
      text-align: right;
    }

    .price-column-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .price-chart-wrap {
      width: 72px;
      height: 28px;
    }

    .price-text-wrap {
      display: flex;
      flex-direction: column;
    }

    .price-main-val {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 14px;
    }

    .price-change-val {
      font-size: 11px;
      color: var(--accent-green);
      font-weight: 600;
    }

    .price-change-val.negative {
      color: var(--accent-red);
    }

    /* Modal Styling - Bloomberg Style Premium Fullscreen (2枚目の青いプレミアムTradingViewテーマ) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 5, 8, 0.85);
      backdrop-filter: blur(12px);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #111827; /* 濃紺 */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-lg);
      width: 96vw;
      height: 94vh;
      max-width: 1800px;
      max-height: 1000px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease, height 0.3s ease;
    }

    .modal.normal-size {
      width: 1100px;
      height: 85vh;
    }

    .modal-close, .modal-toggle-max {
      position: absolute;
      top: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1010;
      font-size: 14px;
      transition: var(--transition);
    }

    .modal-close {
      right: 16px;
    }

    .modal-toggle-max {
      right: 56px;
    }

    .modal-close:hover, .modal-toggle-max:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--accent-teal);
    }

    .modal-company-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(0,0,0,0.25);
    }

    .modal-company-name {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(90deg, #fff, var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 4px;
    }

    .modal-body {
      display: grid;
      grid-template-columns: 1fr 480px;
      height: calc(100% - 100px);
      min-height: 0;
    }

    .modal-left {
      padding: 24px;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .modal-right {
      padding: 24px;
      background: rgba(13, 17, 28, 0.45);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .modal-chart-wrap {
      flex: 1;
      min-height: 320px;
      position: relative;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    /* Drag Handles */
    .resize-handle {
      position: absolute;
      background: transparent;
      z-index: 1005;
    }
    .resize-r { top: 0; right: 0; width: 6px; height: 100%; cursor: col-resize; }
    .resize-b { bottom: 0; left: 0; height: 6px; width: 100%; cursor: row-resize; }
    .resize-se { bottom: 0; right: 0; width: 12px; height: 12px; cursor: nwse-resize; }

    /* Gemini AI Styling */
    .gemini-pulse-loader {
      animation: neonPulse 2s infinite alternate;
    }

    @keyframes neonPulse {
      from { box-shadow: 0 0 10px rgba(56, 189, 248, 0.1), inset 0 0 10px rgba(56, 189, 248, 0.05); }
      to { box-shadow: 0 0 20px rgba(56, 189, 248, 0.3), inset 0 0 15px rgba(56, 189, 248, 0.15); }
    }

    .ai-analysis-card {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-md);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: var(--transition);
    }

    .ai-analysis-card:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(56, 189, 248, 0.2);
      transform: translateX(2px);
    }

    .ai-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Small Modal styling */
    .modal-small {
      width: 420px;
      height: auto;
      min-height: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .form-input {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      outline: none;
      font-size: 13px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }

    /* Settings specific styles */
    .settings-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 640px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .settings-label {
      display: flex;
      flex-direction: column;
    }

    .settings-label span {
      font-size: 13px;
      font-weight: 600;
    }

    .settings-desc {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .settings-section-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--accent-teal);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Toast Container */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 20, 32, 0.9);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border-left: 4px solid var(--accent-teal);
      transform: translateY(20px);
      opacity: 0;
      animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes toastIn {
      to { transform: translateY(0); opacity: 1; }
    }

    .toast.success { border-left-color: var(--accent-green); }
    .toast.error { border-left-color: var(--accent-red); }
    .toast.info { border-left-color: #29b6f6; }

    /* Custom Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

    /* Mobile Adaptations */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border-color);
      z-index: 90;
      align-items: center;
      padding: 0 16px;
      justify-content: space-between;
    }

    @keyframes blink {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      body {
        display: block;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      #app {
        width: 100%;
        overflow-x: hidden;
      }
      .sidebar {
        transform: translateX(-100%);
        width: min(82vw, 300px);
        box-shadow: 20px 0 50px rgba(0, 0, 0, 0.45);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        flex: none;
        margin-left: 0;
        padding: 76px 12px 24px;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }
      .mobile-header {
        display: flex;
        justify-content: flex-start;
        gap: 12px;
      }
      .mobile-header > div {
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
      }
      .mobile-header .logo-main {
        font-size: 14px;
      }
      .ranking-stats-grid {
        grid-template-columns: 1fr !important;
        gap: 10px !important;
        width: 100%;
      }
      .ranking-stats-grid .card {
        padding: 12px !important;
        border-radius: var(--radius-md);
        min-width: 0;
      }
      .filter-bar-container {
        align-items: stretch;
        gap: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .filter-item-wrap {
        width: 100%;
        align-items: stretch;
        flex-direction: column;
        gap: 6px;
      }
      .filter-item-wrap[style] {
        max-width: none !important;
        flex: 1 1 auto !important;
      }
      .select-wrapper,
      .styled-select,
      .styled-input,
      .search-input-wrapper {
        width: 100%;
      }
      #rank-search {
        padding-right: 92px !important;
      }
      .main-table-card {
        background: transparent;
        border: none;
        box-shadow: none;
        overflow: visible;
      }
      .table-container {
        overflow: visible;
      }
      .ranking-table,
      .ranking-table tbody,
      .ranking-table tr,
      .ranking-table td {
        display: block;
        width: 100%;
      }
      .ranking-table thead {
        display: none;
      }
      .ranking-table tr {
        background: var(--bg-card);

function buildSupplementStock([code, name, sector, description, project]) {
  const seed = parseInt(code, 10);
  const baseScore = 7.2 + (seed % 25) / 10;
  const score = Math.min(9.6, Math.round(baseScore * 10) / 10);
  const price = Math.round((900 + (seed % 170) * 45) / 10) * 10;
  const dipSignal = seed % 4 === 0 || seed % 7 === 0;
  const scores = {
    capital: Math.min(10, Math.floor(score + (seed % 3 === 0 ? 1 : 0))),
    projectImpact: Math.min(10, Math.floor(score + (project.includes('AI') || project.includes('DX') ? 1 : 0))),
    liquidity: Math.min(10, Math.floor(score + (seed % 2))),
    financial: Math.min(10, Math.floor(score + (seed % 5 === 0 ? 1 : 0))),
    earnings: Math.min(10, Math.floor(score + (seed % 4 === 0 ? 1 : 0))),
    perPbr: Math.max(6, Math.min(10, Math.floor(score) - (seed % 3 === 1 ? 1 : 0))),
    pl: Math.min(10, Math.floor(score + (seed % 6 === 0 ? 1 : 0))),
    cf: Math.min(10, Math.floor(score + (seed % 5 === 1 ? 1 : 0))),
    report: Math.min(10, Math.floor(score + (seed % 4 === 2 ? 1 : 0))),
    securities: Math.min(10, Math.floor(score + (seed % 4 === 3 ? 1 : 0)))
  };
  const priceHistory = Array.from({ length: 11 }, (_, i) => {
    const wave = Math.sin((seed % 9 + i) / 2.1) * 0.055;
    const trend = (i - 5) * 0.012;
    return Math.max(50, Math.round(price * (0.92 + wave + trend)));
  });
  return { code, name, sector, price, change: 0, score, dipSignal, targetHit: false, targetPrice: Math.round(price * 1.15), description, project, scores, priceHistory, inWatchlist: false };
}

function getDividendProfile(stock) {
  const seed = parseInt(stock.code, 10) || 1000;
  const yieldRate = 2.1 + (seed % 24) / 10;
  const annualDividend = Math.max(5, Math.round(stock.price * yieldRate / 100 / 5) * 5);
  const payoutRatio = 28 + (seed % 34);
  const growthYears = seed % 9;
  const stability = Math.min(10, Math.round((stock.scores.financial * 0.42 + stock.scores.cf * 0.32 + stock.scores.earnings * 0.26) * 10) / 10);
  const incomeScore = Math.round((yieldRate * 1.25 + stability * 0.45 + Math.min(growthYears, 6) * 0.28) * 10) / 10;
  return { yieldRate, annualDividend, payoutRatio, growthYears, stability, incomeScore };
}

function getBenefitProfile(stock) {
  const seed = parseInt(stock.code, 10) || 1000;
  const category = BENEFIT_CATEGORIES[seed % BENEFIT_CATEGORIES.length];
  const minShares = seed % 4 === 0 ? 200 : 100;
  const annualValue = 1000 + (seed % 13) * 500 + (stock.score >= 9.2 ? 1500 : 0);
  const benefitYield = annualValue / (stock.price * minShares) * 100;
  const frequency = seed % 3 === 0 ? '年2回' : '年1回';
  const longTermBonus = seed % 2 === 0 ? '長期保有で優待増額' : '保有期間条件なし';
  const usability = Math.min(10, Math.round((stock.score * 0.48 + stock.scores.liquidity * 0.22 + 2.4) * 10) / 10);
  const benefitScore = Math.round((benefitYield * 18 + usability * 0.7 + (frequency === '年2回' ? 1.1 : 0)) * 10) / 10;
  return { category, minShares, annualValue, benefitYield, frequency, longTermBonus, usability, benefitScore };
}

function getStockTheme(stock) {
  const text = `${stock.sector} ${stock.description} ${stock.project}`;
  if (/AI|DX|データ|ソフト|クラウド|システム|セキュリティ|ゲーム|IP/.test(text)) return 'ai';
  if (/半導体|EUV|HBM|シリコン|電子部品|センサー|MLCC|材料/.test(text)) return 'semiconductor';
  if (/EV|電池|バッテリー|車載|水素|脱炭素/.test(text)) return 'ev';
  if (/防衛|宇宙|航空|重工|エンジン/.test(text)) return 'defense';
  if (/医薬|医療|ヘルス|バイオ|治験|内視鏡|カテーテル/.test(text)) return 'healthcare';
  if (/鉄道|不動産|建設|物流|インフラ|電力|空調|水/.test(text)) return 'infrastructure';
  if (/銀行|保険|証券|金融|リース|取引所/.test(text)) return 'finance';
  if (/小売|食品|飲料|化粧|優待|コンビニ|スーパー|外食|生活/.test(text)) return 'consumer';
  if (/海外|グローバル|北米|インド|欧州|世界/.test(text)) return 'global';
  return 'global';
}

function getDiscoveryProfile(stock) {
  const dividend = getDividendProfile(stock);
  const benefit = getBenefitProfile(stock);
  const valuation = stock.scores.perPbr || 7;
  const quality = ((stock.scores.financial || 7) + (stock.scores.earnings || 7) + (stock.scores.cf || 7)) / 3;
  const theme = getStockTheme(stock);
  const pullback = stock.dipSignal ? 1.2 : 0;
  const overheatPenalty = stock.change > 4 ? 0.8 : 0;
  const bargainScore = Math.round((valuation * 0.95 + quality * 0.75 + dividend.yieldRate * 0.42 + benefit.benefitYield * 6 + pullback - overheatPenalty) * 10) / 10;
  const themeScore = Math.round(((stock.scores.projectImpact || 7) * 0.8 + (stock.scores.liquidity || 7) * 0.35 + stock.score * 0.45 + (theme === rankTheme ? 1.4 : 0)) * 10) / 10;
  return {
    theme,
    dividend,
    benefit,
    bargainScore,
    themeScore,
    totalYield: dividend.yieldRate + benefit.benefitYield,
  };
}

function getDiscoveryScore(stock, mode = rankDiscoveryMode) {
  const p = getDiscoveryProfile(stock);
  switch (mode) {
    case 'dividend': return p.dividend.incomeScore;
    case 'dip': return (stock.dipSignal ? 8 : 4.8) + (stock.scores.financial || 7) * 0.35 + (stock.scores.perPbr || 7) * 0.25;
    case 'benefit': return p.benefit.benefitScore;
    case 'theme': return p.themeScore;
    case 'total': return stock.score;
    default: return p.bargainScore;
  }
}

function getDiscoveryReason(stock, mode = rankDiscoveryMode) {
  const p = getDiscoveryProfile(stock);
  switch (mode) {
    case 'dividend':
      return `配当${p.dividend.yieldRate.toFixed(2)}%、配当性向${p.dividend.payoutRatio}%、財務${p.dividend.stability.toFixed(1)}/10`;
    case 'dip':
      return stock.dipSignal
        ? `押し目候補、財務${stock.scores.financial}/10、PER/PBR評価${stock.scores.perPbr}/10`
        : `押し目待ち、財務${stock.scores.financial}/10、支持帯接近で監視`;
    case 'benefit':
      return `優待${p.benefit.category}、優待利回り${p.benefit.benefitYield.toFixed(2)}%、${p.benefit.longTermBonus}`;
    case 'theme':
      return `${THEME_LABELS[p.theme]}テーマ、Pj評価${stock.scores.projectImpact}/10、流動性${stock.scores.liquidity}/10`;
    case 'total':
      return `総合${stock.score}/10、財務${stock.scores.financial}/10、収益${stock.scores.earnings}/10`;
    default:
      return `割安評価${stock.scores.perPbr}/10、財務${stock.scores.financial}/10、配当${p.dividend.yieldRate.toFixed(2)}%`;
  }
}

function makeLineChart(canvas, data, color) {
  if (!canvas) return null;
  const ctx = canvas.getContext('2d');
  const g = ctx.createLinearGradient(0,0,0,canvas.height||28);
  g.addColorStop(0, color+'44'); g.addColorStop(1, color+'00');
  const chart = new Chart(ctx, {
    type:'line',
    data:{ labels:data.map((_,i)=>i), datasets:[{ data, borderColor:color, borderWidth:1.5, fill:true, backgroundColor:g, tension:.4, pointRadius:0 }] },
    options:{ responsive:false, animation:{duration:500}, plugins:{legend:{display:false},tooltip:{enabled:false}}, scales:{x:{display:false},y:{display:false}} }
  });
  chartInstances.push(chart);
  return chart;
}

// ダッシュボード上の価格表示を本物のデータで非同期に上書き更新する（最大5件の並列バッチ制御）
async function updateDashboardPricesLive() {
  const concurrency = 5;
  const queue = [...STOCKS];
  
  async function worker() {
    while (queue.length > 0) {
      const stock = queue.shift();
      if (!stock || stock.code.length !== 4) continue;
      
      const ticker = `${stock.code}.T`;
      const yfiUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
      
      try {
        const rawData = await fetchFromYahooProxy(yfiUrl);
        const result = rawData.chart.result[0];
        if (!result) continue;
        
        const latestPrice = result.meta.regularMarketPrice;
        const prevClose = result.meta.chartPreviousClose;
        if (latestPrice === undefined || prevClose === undefined) continue;
        
        const changePercent = ((latestPrice - prevClose) / prevClose) * 100;
        
        // グローバルデータを本物で更新
        stock.price = latestPrice;
        stock.change = changePercent;
        
        // UIを直接パタパタと更新
        const row = document.querySelector(`tr[data-code="${stock.code}"]`);
        if (row) {
          const priceValEl = row.querySelector('.price-main-val');
          const priceChangeEl = row.querySelector('.price-change-val');
          if (priceValEl) priceValEl.textContent = fp(latestPrice);
          if (priceChangeEl) {
            priceChangeEl.textContent = fc(changePercent);
            priceChangeEl.classList.toggle('negative', changePercent < 0);
          }
        }
      } catch (e) {
        // 遅延・タイムアウト時は直近値を維持
      }
    }
  }
  
  const workers = Array(concurrency).fill(null).map(() => worker());
  await Promise.all(workers);
}

function initRanking() {
  document.getElementById('rank-mode')?.addEventListener('change', e=>{
    rankDiscoveryMode = e.target.value;
    refreshRankTable();
  });
  document.getElementById('rank-theme')?.addEventListener('change', e=>{
    rankTheme = e.target.value;
    refreshRankTable();
  });
  document.getElementById('rank-sort')?.addEventListener('change', e=>{
    rankSortBy = e.target.value;
    refreshRankTable();
  });
  document.getElementById('rank-sector')?.addEventListener('change', e=>{
    rankSector = e.target.value;
    refreshRankTable();
  });
  
  const searchInput = document.getElementById('rank-search');
  const searchFetchBtn = document.getElementById('btn-search-fetch');
  
  if (searchInput) {
    searchInput.value = rankSearchQuery;
    searchInput.addEventListener('input', e=>{
      rankSearchQuery = e.target.value.trim().toLowerCase();
      if (/^\d{4}$/.test(rankSearchQuery) && !STOCKS.find(s=>s.code===rankSearchQuery)) {
        if (searchFetchBtn) searchFetchBtn.style.display = 'block';
      } else {
        if (searchFetchBtn) searchFetchBtn.style.display = 'none';
      }
      refreshRankTable();
    });
  }
  
  searchFetchBtn?.addEventListener('click', async () => {
    const code = searchInput.value.trim();
    if (!/^\d{4}$/.test(code)) return;
    
    searchFetchBtn.disabled = true;
    searchFetchBtn.textContent = '取得中...';
    
    showToast(`${code} の東証ライブデータを取得中...`, 'info');
    const ticker = `${code}.T`;
    const yfiUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
    
    try {
      const rawData = await fetchFromYahooProxy(yfiUrl);
      const result = rawData.chart.result[0];
      if(!result) throw new Error("Stock not found");
      
      const latestPrice = result.meta.regularMarketPrice || 0;
      const prevClose = result.meta.chartPreviousClose || latestPrice;
      const changePercent = prevClose ? ((latestPrice - prevClose) / prevClose) * 100 : 0;
      
      let companyName = "";
      try {
        const profileUrl = `https://query1.finance.yahoo.com/v7/finance/options/${ticker}`;
        const profData = await fetchFromYahooProxy(profileUrl);
        companyName = profData.optionChain.result[0].quote.shortName || `東証上場企業 ${code}`;
      } catch (e) {
        companyName = `東証上場企業 ${code}`;
      }
      
      const rawSeed = parseInt(code) || 5000;
      const calcScore = (rawSeed % 3) + 7 + (rawSeed % 10)/10;
      
      const newStock = {
        code: code,
        name: companyName.replace("株", "").replace("式", "").replace("会", "").replace("社", "").trim(),
        sector: '東証プライム',
        price: latestPrice,
        change: changePercent,
        score: parseFloat(calcScore.toFixed(1)),
        dipSignal: (rawSeed % 7 === 0 || rawSeed % 5 === 0),
        targetHit: false,
        targetPrice: null,
        description: '東京証券取引所に上場する実在企業。',
        project: '次世代グローバル展開プロジェクト',
        scores: {
          capital: Math.floor(calcScore),
          projectImpact: Math.min(10, Math.floor(calcScore) + (rawSeed % 2 === 0 ? 0 : -1)),
          liquidity: Math.floor(calcScore),
          financial: Math.max(5, Math.floor(calcScore) - 1),
          earnings: Math.floor(calcScore),
          perPbr: Math.max(5, Math.floor(calcScore) - 1),
          pl: Math.floor(calcScore),
          cf: Math.floor(calcScore),
          report: Math.floor(calcScore),
          securities: Math.floor(calcScore)
        },
        priceHistory: [latestPrice*0.9, latestPrice*0.92, latestPrice*0.89, latestPrice*0.94, latestPrice*0.96, latestPrice*0.93, latestPrice*0.97, latestPrice*0.99, latestPrice*0.95, latestPrice*0.98, latestPrice],
        inWatchlist: false
      };
      
      STOCKS.push(newStock);
      showToast(`${newStock.name}（${code}）を追加しました！`,'success');
      
      searchFetchBtn.style.display = 'none';
      searchFetchBtn.disabled = false;
      searchFetchBtn.textContent = '東証取得';
      searchInput.value = '';
      rankSearchQuery = '';
      
      refreshRankTable();
      
    } catch (err) {
      showToast(`コード ${code} は東証に存在しないか、取得できませんでした。`, 'error');
      searchFetchBtn.disabled = false;
      searchFetchBtn.textContent = '東証取得';
    }
  });

  const dipToggle = document.getElementById('dip-toggle');
  if (dipToggle) {
    dipToggle.classList.toggle('on', rankDipOnly);
    dipToggle.closest('.dip-toggle-container')?.addEventListener('click', ()=>{
      rankDipOnly = !rankDipOnly;
      dipToggle.classList.toggle('on', rankDipOnly);
      refreshRankTable();
    });
  }
  
  refreshRankTable();
}

function refreshRankTable() {
  destroyCharts();
  let list = STOCKS.filter(s=>( (rankSector==='all'||s.sector===rankSector) && (!rankDipOnly||s.dipSignal) ));
  if (rankTheme !== 'all') {
    list = list.filter(s => getStockTheme(s) === rankTheme);
  }
  
  if (rankSearchQuery) {
    list = list.filter(s => 
      s.code.includes(rankSearchQuery) || 
      s.name.toLowerCase().includes(rankSearchQuery) ||
      s.sector.toLowerCase().includes(rankSearchQuery)
    );
  }
  
  const useDiscoverySort = rankDiscoveryMode !== 'total';
  if (useDiscoverySort) {
    list.sort((a,b)=>getDiscoveryScore(b)-getDiscoveryScore(a));
  } else {
    list.sort((a,b)=>{
      switch(rankSortBy){
        case 'score-asc': return a.score-b.score;
        case 'price-desc': return b.price-a.price;
        case 'price-asc': return a.price-b.price;
        case 'change-desc': return b.change-a.change;
        case 'change-asc': return a.change-b.change;
        case 'dip-first': return (b.dipSignal?1:0) - (a.dipSignal?1:0);
        default: return b.score-a.score;
      }
    });
  }
  list = list.slice(0, 100);
  
  const tbody = document.getElementById('rank-tbody');

  tbody.innerHTML = list.map((s,i)=>{

          <linearGradient id="goldGrad" x1="6" y1="4" x2="18" y2="20" gradientUnits="userSpaceOnUse">

    } else if (i === 1) {
      medalHtml = `<svg width="24" height="28" viewBox="0 0 24 28" fill="none" style="filter: drop-shadow(0 2px 6px rgba(192, 192, 192, 0.45));">

      </svg>`;
    } else if (i === 2) {

      medalHtml = `<span style="font-size:12px;font-weight:600;color:var(--text-muted);">${i+1}</span>`;
    }
    
    const rowClass = i === 0 ? 'animate-row active-gold-row' : 'animate-row';

function exportCSV() {
  const rows=['Timestamp,Code,Name,Type,Details,Score',...signalData.map(s=>`"${s.timestamp}","${s.code}","${s.name}","${s.type}","${s.priceDetails}","${s.score||''}"`)];
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='signals_log.csv'; a.click();
  showToast('CSVをエクスポートしました','success');
}

function fetchWithTimeout(url, options = {}, timeout = 2500) {
  // ブラウザによるローカルキャッシュを完全にバイパスするためのヘッダーを追加
  const fetchOptions = {
    ...options,
    cache: 'no-store',
    headers: {
      ...options.headers,
      'Pragma': 'no-cache',
      'Cache-Control': 'no-cache'
    }
  };
  return Promise.race([
    fetch(url, fetchOptions),
    new Promise((_, reject) => setTimeout(() => reject(new Error('Fetch timeout')), timeout))
  ]);
}

// 多目的CORSプロキシ対応Yahoo Financeフェッチャー（キャッシュ回避＆タイムアウト調整＆多重フォールバック）
async function fetchFromYahooProxy(yfiUrl, isChart = false) {
  const timeoutLimit = isChart ? 8000 : 4000; // チャートはデータサイズが大きいため長めのタイムアウト
  const cacheBuster = `nocache=${Date.now()}`;
  
  // Yahoo FinanceへのターゲットURLは常にクリーンに保ち（ strict パラメータ検証を回避 ）、
  // キャッシュ回避用のランダム値はプロキシラッパーのクエリ側に付与します。

  // 0. Vercel上では同一オリジンのAPIを最優先で試す
  try {
    const localApiUrl = `/api/yahoo?url=${encodeURIComponent(yfiUrl)}&${cacheBuster}`;
    const res = await fetchWithTimeout(localApiUrl, {}, timeoutLimit);
    if (res.ok) {
      const data = await res.json();
      if (data && !data.error) return data;
    }
  } catch (e) {
    console.warn('local api/yahoo failed:', e.message);
  }
  
  // 1. まず高速な corsproxy.io を試行
  try {
    const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(yfiUrl)}&${cacheBuster}`;
    const res = await fetchWithTimeout(proxyUrl, {}, timeoutLimit);
    if (res.ok) {
      const data = await res.json();
      if (data && !data.error) return data;
    }
  } catch (e) {
    console.warn('corsproxy.io failed:', e.message);
  }
  
  // 2. 次に別の高速プロキシ codetabs を試行
  try {
    const proxyUrl = `https://api.codetabs.com/v1/proxy?url=${encodeURIComponent(yfiUrl)}&${cacheBuster}`;
    const res = await fetchWithTimeout(proxyUrl, {}, timeoutLimit);
    if (res.ok) {
      const data = await res.json();
      if (data && !data.error) return data;
    }
  } catch (e) {
    console.warn('codetabs proxy failed:', e.message);
  }
  
  // 3. 最後に最も汎用的な api.allorigins.win を試行（タイムアウト長め）
  try {
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yfiUrl)}&${cacheBuster}`;
    const res = await fetchWithTimeout(proxyUrl, {}, isChart ? 9000 : 5000);
    if (res.ok) {
      const json = await res.json();
      if (json.contents) {
        const parsed = JSON.parse(json.contents);
        if (parsed && !parsed.error) return parsed;
      }
    }
  } catch (e) {
    console.warn('allorigins proxy failed:', e.message);
  }
  
  throw new Error("All CORS proxies failed to fetch Yahoo Finance data.");
}

// Yahoo Finance 生データ取得（CORSプロキシ経由＆二重サーバー冗長化）
async function fetchYahooFinanceCandles(code, timeframe) {
  const ticker = code.length === 4 ? `${code}.T` : code;
  let interval = '1d';
  let range = '1y';
  
  if (timeframe === '5m') { interval = '5m'; range = '1d'; }
  else if (timeframe === '15m') { interval = '15m'; range = '5d'; }
  else if (timeframe === '1h') { interval = '60m'; range = '1mo'; }
  else if (timeframe === '4h') { interval = '60m'; range = '3mo'; }
  else if (timeframe === '1d') { interval = '1d'; range = '5y'; }
  else if (timeframe === '1wk') { interval = '1wk'; range = '10y'; }
  else if (timeframe === '1mo') { interval = '1mo'; range = 'max'; }
  
  // query1 と query2 の二重化でサーバー障害・レート制限を回避
  const endpoints = [
    `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=${interval}&range=${range}`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=${interval}&range=${range}`
  ];
  
  let lastErr = null;
  for (const yfiUrl of endpoints) {
    try {
      console.log(`Fetching candles from Yahoo Finance: ${yfiUrl}`);
      const rawData = await fetchFromYahooProxy(yfiUrl, true);
      const result = rawData.chart.result[0];
      if (!result) throw new Error("Ticker not found on Yahoo Finance");
      
      const timestamps = result.timestamp;
      const quote = result.indicators.quote[0];
      const closeData = quote.close;
      const openData = quote.open;
      const highData = quote.high;
      const lowData = quote.low;
      
      if (!timestamps || !closeData) throw new Error("No stock data returned");
      
      let candles = [];
      let seenTimes = new Set();
      for (let i = 0; i < timestamps.length; i++) {
        if (closeData[i] === null || openData[i] === null || highData[i] === null || lowData[i] === null) continue;
        
        let time;
        if (timeframe === '1d') {
          time = new Date(timestamps[i] * 1000).toISOString().split('T')[0];
        } else {
          time = timestamps[i]; // Unix timestamp (seconds) for intra-day
        }
        
        // 重複したタイムスタンプを徹底排除
        if (seenTimes.has(time)) continue;
        seenTimes.add(time);
        
        candles.push({
          time: time,
          open: openData[i],
          high: highData[i],
          low: lowData[i],
          close: closeData[i]
        });
      }
      
      // タイムスタンプ順に厳密に昇順ソートする（Lightweight Chartsの必須仕様）
      candles.sort((a, b) => {
        if (typeof a.time === 'string') {
          return a.time.localeCompare(b.time);
        }
        return a.time - b.time;
      });
      
      if (candles.length === 0) throw new Error("No valid candles after cleaning");
      
      // リアルタイム取得成功フラグを付与
      candles.isRealtime = true;
      return candles;
    } catch (err) {
      console.warn(`Attempt failed with ${yfiUrl}:`, err.message);
      lastErr = err;
    }
  }
  
  throw new Error(`All Yahoo Finance endpoints/proxies failed for ${ticker}.`, { cause: lastErr });
}


function calculateEMA(data, period) {
  let ema = [];
  if (data.length === 0) return ema;
  const k = 2 / (period + 1);
  let prevEma = data[0].close;
  
  for (let i = 0; i < data.length; i++) {
    const val = data[i].close;
    const currentEma = i === 0 ? val : val * k + prevEma * (1 - k);
    ema.push({ time: data[i].time, value: currentEma });
    prevEma = currentEma;
  }
  return ema;
}

function calculateDipSetup(candles, ema25, ema75, ema200) {
  if (!candles || candles.length < 60) {
    return { active: false, price: null, reason: '判定に必要なローソク足が不足しています' };
  }

  const latest = candles[candles.length - 1];
  const previous = candles[candles.length - 2];
  const close = latest.close;
  const recent = candles.slice(-80);
  const recentStops = candles.slice(-25);
  const recentHigh = Math.max(...recent.map(c => c.high));
  const recentLow = Math.min(...recent.map(c => c.low));
  const stopLoss = Math.min(...recentStops.map(c => c.low));
  const pullbackFromHigh = recentHigh > 0 ? (recentHigh - close) / recentHigh : 0;
  const bouncedToday = latest.close > latest.open || latest.close > previous.close;
  const emaCandidates = [ema25, ema75, ema200]
    .map(series => series.length ? series[series.length - 1].value : null)
    .filter(value => value && value < close * 1.035 && value > close * 0.88);
  const swingCandidates = recent
    .slice(0, -1)
    .filter(c => c.low < close && c.low > close * 0.86)
    .map(c => c.low);
  const supports = [...emaCandidates, ...swingCandidates].sort((a, b) => b - a);
  const support = supports[0] || recentLow;
  const nearSupport = support ? Math.abs(close - support) / close <= 0.065 : false;
  const active = pullbackFromHigh >= 0.06 && nearSupport && bouncedToday;
  const supportText = support ? `支持候補 ${fp(support)}` : '支持候補なし';
  const stopText = Number.isFinite(stopLoss) ? `損切り目安は直近安値 ${fp(stopLoss)} 割れ` : '損切り目安は直近安値割れ';
  const pullbackText = `直近高値から約${Math.round(pullbackFromHigh * 100)}%調整`;

  return {
    active,
    price: support || null,
    reason: active
      ? `${pullbackText}、${supportText}付近まで下げた後に反発を確認。${stopText}`
      : `${pullbackText}、${supportText}付近。反発確認は弱めのため、${stopText}`
  };
}

function applyChartViewport(candles, timeframe) {
  if (!activeLightweightChart || !candles || candles.length === 0) return;

  const visibleBars = timeframe === '1d'
    ? 250
    : timeframe === '1wk'
      ? 156
      : timeframe === '1mo'
        ? 120
        : Math.min(candles.length, 220);
  const rightOffset = timeframe === '1d' ? 42 : 28;
  const from = Math.max(0, candles.length - visibleBars);

  activeLightweightChart.timeScale().setVisibleLogicalRange({
    from,
    to: candles.length - 1 + rightOffset
  });
}

function initResizableModal() {
  const modal = document.getElementById('stock-modal');
  if (!modal) return;
  const handles = modal.querySelectorAll('.resize-handle');
  
  handles.forEach(handle => {
    handle.addEventListener('mousedown', initDrag);
  });
  
  function initDrag(e) {
    e.preventDefault();
    const direction = e.target.dataset.direction;
    const startX = e.clientX;
    const startY = e.clientY;
    const startWidth = modal.offsetWidth;
    const startHeight = modal.offsetHeight;
    
    modal.classList.add('normal-size'); // ドラッグ時に自動でサイズトグル状態へ
    document.body.style.userSelect = 'none';
    
    document.addEventListener('mousemove', doDrag);
    document.addEventListener('mouseup', stopDrag);
    
    function doDrag(ev) {
      if (direction === 'r' || direction === 'se') {
        const newWidth = startWidth + (ev.clientX - startX);
        if (newWidth > 680 && newWidth < window.innerWidth - 40) {
          modal.style.width = newWidth + 'px';
        }
      }
      if (direction === 'b' || direction === 'se') {
        const newHeight = startHeight + (ev.clientY - startY);
        if (newHeight > 500 && newHeight < window.innerHeight - 40) {
          modal.style.height = newHeight + 'px';
        }
      }
      
      if (activeLightweightChart) {
        const container = document.getElementById('detail-chart-container');
        if (container) {
          activeLightweightChart.resize(container.offsetWidth, container.offsetHeight);
        }
      }
      
      modalCharts.forEach(c => {
        try { c.resize(); } catch(err) {}
      });
    }
    
    function stopDrag() {
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', doDrag);
      document.removeEventListener('mouseup', stopDrag);
    }
  }
}

// Gemini API動的連携 & ローカルAIハイブリッド処理
function initGeminiAPIIntegration(stock) {

  const localAI = generateLocalAIParsing(stock);
  updateGeminiResultUI(localAI);
  
  if (isLinked) {

  }
  
  btn.addEventListener('click', () => {
    if (isLinked) {
      localStorage.removeItem('gemini_api_key');
      keyInput.value = '';
      isLinked = false;
      updateAPIUI(false);
      updateGeminiResultUI(localAI); // 解除時はローカルAIに戻す
      showToast('Gemini APIの連携を解除しました。ローカルAI分析を適用。', 'info');
    } else {
      const key = keyInput.value.trim();
      if (!key) {
        showToast('APIキーを入力してください', 'error');
        keyInput.focus();
        return;
      }
      localStorage.setItem('gemini_api_key', key);
      isLinked = true;
      updateAPIUI(true);
      fetchRealGeminiAnalysis(stock, key);
      showToast('Gemini API連携有効化。最新の外部AIコグニティブ解析中...', 'success');
    }
  });
  
  function updateAPIUI(linked) {
    if (linked) {
      btn.textContent = '連携解除';
      btn.style.background = 'rgba(239, 83, 80, 0.2)';
      btn.style.border = '1px solid rgba(239, 83, 80, 0.4)';
      btn.style.color = '#ef5350';
    } else {
      btn.textContent = '連携有効';
      btn.style.background = 'linear-gradient(135deg, var(--accent-teal), var(--accent-green))';
      btn.style.border = 'none';
      btn.style.color = '#0a0e1a';
    }
  }
  
  async function fetchRealGeminiAnalysis(s, apiKey) {
    if (loader) loader.style.display = 'flex';
    if (container) container.style.display = 'none';
    
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    
    const prompt = `あなたは超一流のヘッジファンドアナリストです。日本株の「${s.name} (${s.code})」について、プロジェクト「${s.project}」を踏まえて、以下の6大領域についてプロの視点からそれぞれ100〜150文字程度で超高度な分析を行ってください。

1. 【世間の評価】: SNSや投資コミュニティ等のセンチメント要約
2. 【プロジェクトインパクト】: 進行中プロジェクト「${s.project}」の市場シェア拡大確率と将来の収益寄盤へのインパクト予測
3. 【財務の健全性】: バランスシートやキャッシュフローから見る潜在的な財務リスクや健全性の総括
4. 【テクニカル・売買タイミング予測】: 25EMA/75EMA/200EMA等のトレンドラインを踏まえた、最適エントリー判定
5. 【市場競争優位性】: 競合他社と比較した同社のコア競争力、参入障壁(Moat)、市場シェア優益性評価
6. 【大口機関投資家動向】: 国内外ヘッジファンドや機関投資家の保有・買い集め動向、アナリストレーティングの評価

出力は必ず以下の有効なJSON形式にしてください。マークダウンの装飾や余分な文字は含めず、純粋なJSON文字列のみを返してください。必ずこのキーを使用してください：
{
  "sentiment": "世間の評価の文章...",
  "sentiment_badge": "期待度:極大",
  "growth": "プロジェクトインパクトの文章...",
  "growth_badge": "成長性:極大",
  "financial": "財務健全性の文章...",
  "financial_badge": "リスク極小",
  "technical": "売買タイミング予測の文章...",
  "technical_badge": "絶好の押し目",
  "competition": "市場競争優位性の文章...",
  "competition_badge": "圧倒的優位",
  "institutional": "大口機関投資家動向の文章...",
  "institutional_badge": "買い越し継続"
}`;
 
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { responseMimeType: "application/json" }
        })
      });
      
      if (!response.ok) throw new Error("Gemini API request failed");
      const data = await response.json();
      
      if (!data.candidates || !data.candidates[0].content.parts[0].text) {
        throw new Error("Invalid response format from Gemini");
      }
      
      const responseText = data.candidates[0].content.parts[0].text;
      const parsed = JSON.parse(responseText.trim());
      updateGeminiResultUI(parsed);
    } catch (err) {
      console.warn("Gemini API Live fetch failed. Maintaining premium local AI analysis.", err);
      updateGeminiResultUI(localAI);
    } finally {
      if (loader) loader.style.display = 'none';
      if (container) container.style.display = 'grid';

  function updateGeminiResultUI(data) {
    const elGrowth = document.getElementById('ai-text-growth');

function drawScoreGauge(canvas, score) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  // デバイスのピクセル比率（DPR）に対応して高精細に描画する
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  
  ctx.clearRect(0, 0, rect.width, rect.height);
  
  const cx = rect.width / 2;
  const cy = rect.height - 2; // 下端から少し浮かせる
  const r = rect.width / 2 - 8;
  
  // 背景アーク (灰色の背景軌道)
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)'; // 2枚目の画像のグレーに近い色調
  ctx.lineWidth = 6;
  ctx.stroke();
  
  // スコアに基づく塗りつぶしアーク (綺麗なエメラルドグリーン単色)
  const scorePercent = Math.min(Math.max(score / 10, 0), 1);
  const endAngle = Math.PI + (Math.PI * scorePercent);
  
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, endAngle);
  ctx.strokeStyle = '#10b981'; // 2枚目の画像に完全に合致する鮮やかなグリーン
  ctx.lineWidth = 6;
  ctx.stroke();
  
  // 針 (メーターの針 - 角度0が真右なのでrotate(endAngle)でダイレクトに完璧な方向を指します)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(endAngle);
  ctx.beginPath();
  ctx.moveTo(0, -2);
  ctx.lineTo(r - 4, 0); // 先端をシャープにした美しい白い指針
  ctx.lineTo(0, 2);
  ctx.closePath();
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.restore();
  
  // 中心ピン
  ctx.beginPath();
  ctx.arc(cx, cy, 3.5, 0, 2 * Math.PI);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
}

function buildDetailChart(stock, timeframe = '1d') {
  const container = document.getElementById('detail-chart-container');
  if (!container) return;
  
  const initWidth = container.clientWidth || 550;
  const initHeight = container.clientHeight || 380;
  
  const chart = LightweightCharts.createChart(container, {
    width: initWidth,
    height: initHeight,
    layout: {
      background: { color: 'rgba(0,0,0,0)' },
      textColor: '#94a3b8',
    },
    grid: {
      vertLines: { color: 'rgba(255, 255, 255, 0.04)' },
      horzLines: { color: 'rgba(255, 255, 255, 0.04)' },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: 'rgba(56, 189, 248, 0.4)', width: 1, style: 3 },
      horzLine: { color: 'rgba(56, 189, 248, 0.4)', width: 1, style: 3 },
    },
    rightPriceScale: { borderColor: 'rgba(255, 255, 255, 0.08)' },
    timeScale: {
      borderColor: 'rgba(255, 255, 255, 0.08)',
      timeVisible: timeframe !== '1d',
      rightOffset: 42,
      barSpacing: 5.5,
    },
    handleScroll: true,
    handleScale: true,
  });
  
  const candlestickSeries = chart.addCandlestickSeries({
    upColor: '#10b981',
    downColor: '#ef4444',
    borderVisible: false,
    wickUpColor: '#10b981',
    wickDownColor: '#ef4444',
  });
  
  const ema25Series = chart.addLineSeries({ color: '#29b6f6', lineWidth: 1.2, priceLineVisible: false, lastValueVisible: false });
  const ema75Series = chart.addLineSeries({ color: '#ffa726', lineWidth: 1.2, priceLineVisible: false, lastValueVisible: false });
  const ema200Series = chart.addLineSeries({ color: '#ec407a', lineWidth: 1.2, priceLineVisible: false, lastValueVisible: false });
  
  activeLightweightChart = chart;
  activeCandleSeries = candlestickSeries;
  activeEma25Series = ema25Series;
  activeEma75Series = ema75Series;
  activeEma200Series = ema200Series;
  
  updateChartTimeframe(stock, timeframe);
}

async function updateChartTimeframe(stock, timeframe) {
  if (!activeLightweightChart || !activeCandleSeries) return;
  
  let candles;
  try {
    candles = await fetchYahooFinanceCandles(stock.code, timeframe);
  } catch (err) {
    console.error('Failed to load live chart data:', err);
    activeChartCandles = [];
    activeCandleSeries.setData([]);
    activeEma25Series.setData([]);
    activeEma75Series.setData([]);
    activeEma200Series.setData([]);
    updateEmaLegend(null, null, null);

    const chartTitleEl = document.getElementById('modal-chart-title');
    const badge = document.getElementById('chart-dip-badge');
    const status = document.getElementById('modal-status-text');
    const statusDot = document.getElementById('modal-status-dot');
    const statusBox = document.getElementById('modal-status-box');

    if (chartTitleEl) {
      chartTitleEl.innerHTML = `■ 株価チャート - <span style="color: var(--accent-red); font-weight: 700;">実データ取得失敗</span>`;
    }
    if (badge) badge.style.display = 'none';
    if (status) status.textContent = 'ステータス: 実データの取得に失敗しました';
    if (statusDot) statusDot.style.backgroundColor = 'var(--accent-red)';
    if (statusBox) {
      statusBox.style.borderColor = 'rgba(239, 68, 68, 0.3)';
      statusBox.style.background = 'rgba(239, 68, 68, 0.08)';
      statusBox.style.color = 'var(--accent-red)';
    }
    return;
  }
  activeChartCandles = candles;
  activeChartTimeframe = timeframe;
  
  const chartTitleEl = document.getElementById('modal-chart-title');
  if (chartTitleEl) {
    chartTitleEl.innerHTML = `■ 株価チャート - <span style="color: var(--accent-green); font-weight: 700;">東証リアルタイム</span>`;
  }
  
  const ema25 = calculateEMA(candles, 25);
  const ema75 = calculateEMA(candles, 75);
  const ema200 = calculateEMA(candles, 200);
  
  activeCandleSeries.setData(candles);
  activeEma25Series.setData(ema25);
  activeEma75Series.setData(ema75);
  activeEma200Series.setData(ema200);
  
  // 既存の押し目水平線をクリアして重複描画を確実に防ぐ
  if (activeCandleSeries._dipPriceLine) {
    try {
      activeCandleSeries.removePriceLine(activeCandleSeries._dipPriceLine);
    } catch(e) {}
    activeCandleSeries._dipPriceLine = null;
  }
  
  const dipSetup = calculateDipSetup(candles, ema25, ema75, ema200);
  const visibleDipSetup = {
    ...dipSetup,
    active: stock.dipSignal || dipSetup.active,
    reason: stock.dipSignal && !dipSetup.active
      ? `登録済み押し目候補。${dipSetup.reason}`
      : dipSetup.reason
  };
  syncDipSignalUi(visibleDipSetup);

  // 登録済みの押し目銘柄、またはローソク足から反発を確認できた場合に支持候補を描画
  if (visibleDipSetup.active && visibleDipSetup.price) {
    const dipPrice = visibleDipSetup.price;
    activeCandleSeries._dipPriceLine = activeCandleSeries.createPriceLine({
      price: dipPrice,
      color: '#10b981', // 明るいグリーン
      lineWidth: 1.5,
      lineStyle: 2, // 破線 (Dashed)
      axisLabelVisible: true,
      title: '押し目候補: ¥' + Math.round(dipPrice).toLocaleString()
    });
  }
  
  const latestCandle = candles[candles.length - 1];
  if (latestCandle) {
    const currentPrice = latestCandle.close;
    const priceLabel = document.getElementById('chart-legend-price');
    if (priceLabel) priceLabel.textContent = fp(currentPrice);
  }
  
  updateEmaLegend(
    ema25.length > 0 ? ema25[ema25.length - 1].value : null,
    ema75.length > 0 ? ema75[ema75.length - 1].value : null,
    ema200.length > 0 ? ema200[ema200.length - 1].value : null
  );
  
  activeLightweightChart.subscribeCrosshairMove(param => {
    if (param.time) {
      const candleData = param.seriesData.get(activeCandleSeries);
      const ema25Val = param.seriesData.get(activeEma25Series);
      const ema75Val = param.seriesData.get(activeEma75Series);
      const ema200Val = param.seriesData.get(activeEma200Series);
      
      if (candleData) {
        const priceLabel = document.getElementById('chart-legend-price');
        if (priceLabel) priceLabel.textContent = fp(candleData.close);
      }
      
      updateEmaLegend(
        ema25Val ? ema25Val.value : null,
        ema75Val ? ema75Val.value : null,
        ema200Val ? ema200Val.value : null
      );
    } else {
      updateEmaLegend(
        ema25.length > 0 ? ema25[ema25.length - 1].value : null,
        ema75.length > 0 ? ema75[ema75.length - 1].value : null,
        ema200.length > 0 ? ema200[ema200.length - 1].value : null
      );
    }
  });
  
  const container = document.getElementById('detail-chart-container');
  if (container) {
    const w = container.offsetWidth || 550;
    const h = container.offsetHeight || 380;
    activeLightweightChart.resize(w, h);
  }
  applyChartViewport(candles, timeframe);
}

function updateEmaLegend(ema25, ema75, ema200) {
  const e25El = document.getElementById('legend-ema25');
  const e75El = document.getElementById('legend-ema75');
  const e200El = document.getElementById('legend-ema200');
  
  if (e25El) e25El.textContent = ema25 !== null ? Math.round(ema25).toLocaleString('ja-JP') : '-';
  if (e75El) e75El.textContent = ema75 !== null ? Math.round(ema75).toLocaleString('ja-JP') : '-';
  if (e200El) e200El.textContent = ema200 !== null ? Math.round(ema200).toLocaleString('ja-JP') : '-';
}

function buildRadar(stock) {
  const canvas = document.getElementById('radar-c');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const labels = ['資本金','Pj.Impact','流動性','財務健全','収益力','PER・PBR','PL','CF','四季報','証券'];
  const vals = Object.values(stock.scores);
  const g = ctx.createRadialGradient(110,85,0,110,85,85);
  g.addColorStop(0,'rgba(2,132,199,0.25)'); 
  g.addColorStop(1,'rgba(16,185,129,0.05)');
  
  const c = new Chart(ctx,{
    type:'radar',
    data:{ labels, datasets:[{ data:vals, borderColor:'#10b981', borderWidth:2, backgroundColor:g, pointBackgroundColor:'#0284c7', pointRadius:2.5 }] },
    options:{ 
      responsive:false, 
      animation:{duration:700}, 
      plugins:{legend:{display:false}},
      scales:{ r:{ min:0, max:10, grid:{color:'rgba(255,255,255,0.06)'}, angleLines:{color:'rgba(255,255,255,0.05)'}, pointLabels:{color:'#8892a4',font:{size:8}}, ticks:{display:false,stepSize:2} } }
    }
  });
  modalCharts.push(c);
}

// ============================================
// ROUTER & NAVIGATION
// ============================================
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  destroyCharts();
  const main = document.getElementById('main-content');
  switch(page) {
    case 'ranking':  main.innerHTML=renderRanking();  initRanking();   break;
    case 'watchlist':main.innerHTML=renderWatchlist();initWatchlist(); break;
    case 'signals':  main.innerHTML=renderSignals();  initSignals();   break;
    case 'dividends': main.innerHTML=renderIncomeRanking('dividend'); initDividendRanking(); break;
    case 'benefits': main.innerHTML=renderIncomeRanking('benefit'); initBenefitRanking(); break;
    case 'settings': main.innerHTML=renderSettings(); initSettings(); break;
  }
}

// ============================================
// LIFECYCLE & EVENT LISTENERS
// ============================================
document.addEventListener('DOMContentLoaded', ()=>{
  initSavedUIBackground();

  // Navigation Menu click
  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click',()=>{
      navigate(btn.dataset.page);
      document.getElementById('sidebar').classList.remove('open');
    });
  });

  // Mobile navigation
  document.getElementById('hamburger')?.addEventListener('click',()=>{
    document.getElementById('sidebar').classList.add('open');
  });

  // Modal actions
  document.getElementById('modal-close')?.addEventListener('click', closeModal);
  
  // 最大化/通常サイズ切替
  document.getElementById('modal-toggle-max')?.addEventListener('click', () => {
    const modal = document.getElementById('stock-modal');
    modal?.classList.toggle('normal-size');
    
    // Lightweight charts resize
    setTimeout(() => {
      if (activeLightweightChart) {
        const container = document.getElementById('detail-chart-container');
        if (container) {
          activeLightweightChart.resize(container.offsetWidth, container.offsetHeight);
          applyChartViewport(activeChartCandles, activeChartTimeframe);
        }
      }
    }, 150);
  });
  
  document.getElementById('modal-overlay')?.addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
  document.getElementById('add-cancel')?.addEventListener('click', ()=>document.getElementById('add-stock-overlay').classList.remove('active'));
  document.getElementById('add-stock-overlay')?.addEventListener('click', e=>{ if(e.target===e.currentTarget) document.getElementById('add-stock-overlay').classList.remove('active'); });

  window.addEventListener('resize', () => {
    if (!activeLightweightChart) return;
    const container = document.getElementById('detail-chart-container');
    if (!container) return;
    activeLightweightChart.resize(container.offsetWidth, container.offsetHeight);
    applyChartViewport(activeChartCandles, activeChartTimeframe);
  });
  
  // 東証生データの動的追加取得処理
  document.getElementById('add-confirm')?.addEventListener('click', async () => {
    const code = document.getElementById('add-code').value.trim();
    if(!/^\d{4}$/.test(code)){ showToast('銘柄コード(4桁)を入力してください','error'); return; }
    
    const existing = STOCKS.find(s=>s.code===code);
    if(existing){ 
      if(!watchlistData.find(s=>s.code===code)){ watchlistData.push(existing); existing.inWatchlist=true; } 
      showToast(`${existing.name} をウォッチリストに追加しました`,'success');
      document.getElementById('add-stock-overlay').classList.remove('active');
      if(currentPage==='watchlist') navigate('watchlist');
      return; 
    }
    
    showToast('東証から企業情報を自動取得中...', 'info');
    const ticker = `${code}.T`;
    const yfiUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
    
    try {
      const rawData = await fetchFromYahooProxy(yfiUrl);
      const result = rawData.chart.result[0];
      if(!result) throw new Error("Stock not found");
      
      const latestPrice = result.meta.regularMarketPrice || 0;
      const prevClose = result.meta.chartPreviousClose || latestPrice;
      const changePercent = prevClose ? ((latestPrice - prevClose) / prevClose) * 100 : 0;
      
      let companyName = "";
      try {
        const profileUrl = `https://query1.finance.yahoo.com/v7/finance/options/${ticker}`;
        const profData = await fetchFromYahooProxy(profileUrl);
        companyName = profData.optionChain.result[0].quote.shortName || `東証上場企業 ${code}`;
      } catch (e) {
        companyName = `東証上場企業 ${code}`;
      }
      
      const rawSeed = parseInt(code) || 5000;
      const calcScore = (rawSeed % 3) + 7 + (rawSeed % 10)/10;
      
      const newStock = {
        code: code,
        name: companyName.replace("株", "").replace("式", "").replace("会", "").replace("社", "").trim(),
        sector: '東証プライム',
        price: latestPrice,
        change: changePercent,
        score: parseFloat(calcScore.toFixed(1)),
        dipSignal: (rawSeed % 7 === 0 || rawSeed % 5 === 0),
        targetHit: false,
        targetPrice: null,
        description: '東京証券取引所に上場する実在企業。',
        project: '次世代グローバル展開プロジェクト',
        scores: {
          capital: Math.floor(calcScore),
          projectImpact: Math.min(10, Math.floor(calcScore) + (rawSeed % 2 === 0 ? 0 : -1)),
          liquidity: Math.floor(calcScore),
          financial: Math.max(5, Math.floor(calcScore) - 1),
          earnings: Math.floor(calcScore),
          perPbr: Math.max(5, Math.floor(calcScore) - 1),
          pl: Math.floor(calcScore),
          cf: Math.floor(calcScore),
          report: Math.floor(calcScore),
          securities: Math.floor(calcScore)
        },
        priceHistory: [latestPrice*0.9, latestPrice*0.92, latestPrice*0.89, latestPrice*0.94, latestPrice*0.96, latestPrice*0.93, latestPrice*0.97, latestPrice*0.99, latestPrice*0.95, latestPrice*0.98, latestPrice],
        inWatchlist: true
      };
      
      STOCKS.push(newStock);
      watchlistData.push(newStock);
      showToast(`${newStock.name}（${code}）をウォッチリストに追加しました！`,'success');
      
      document.getElementById('add-stock-overlay').classList.remove('active');
      document.getElementById('add-code').value='';
      
      if(currentPage==='watchlist') navigate('watchlist');
    } catch (err) {
      showToast(`コード ${code} は東証に存在しないか、取得できませんでした。`, 'error');
    }
  });

  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeIncomeDetailPopup(); closeAIInsightPopup(); closeModal(); document.getElementById('add-stock-overlay').classList.remove('active'); } });

  // Initial Router boot
  navigate('ranking');
  updateDashboardPricesLive();
  setInterval(updateDashboardPricesLive, 60000);
});
</script>
