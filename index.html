<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- 郢ｧ・ｭ郢晢ｽ｣郢昴・縺咏ｹ晢ｽ･霎滂ｽ｡陷会ｽｹ陋ｹ謔ｶﾎ鍋ｹｧ・ｿ郢ｧ・ｿ郢ｧ・ｰ -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Stock Value & Timing Analyzer</title>
  
  <!-- Google Fonts: Inter & Orbitron & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Chart.js & Lightweight Charts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
  
  <style>
    :root {
      --bg-dark: #0f172a; /* 雎ｺ・ｱ邵ｺ・ｿ邵ｺ・ｮ邵ｺ繧・ｽ矩ｏ・ｺ豼ｶ・ｲ郢晢ｽｻ魄溘・*/
      --bg-card: rgba(30, 41, 59, 0.7); /* 2隴ｫ螟ょｲｼ邵ｺ・ｮ騾包ｽｻ陷剃ｸ岩・髴台ｻ｣・樣ｫｱ蛛ｵ・樒ｹｧ・ｫ郢晢ｽｼ郢晁歓繝ｬ隴趣ｽｯ */
      --bg-sidebar: #0f172a; /* 郢ｧ繝ｻ・・ｭ牙干・樣ｏ・ｺ豼ｶ・ｲ邵ｺ・ｮ郢ｧ・ｵ郢ｧ・､郢晏ｳｨ繝ｰ郢晢ｽｼ */
      --border-color: rgba(255, 255, 255, 0.1); /* 邵ｺ・ｯ邵ｺ・｣邵ｺ髦ｪ・顔ｸｺ・ｨ邵ｺ蜉ｱ笳・・・髦憺こ繝ｻ*/
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-teal: #38bdf8; /* 郢ｧ・｢郢ｧ・ｯ郢ｧ・ｻ郢晢ｽｳ郢晏現繝ｶ郢晢ｽｫ郢晢ｽｼ繝ｻ閧ｲ・ｩ・ｺ豼ｶ・ｲ繝ｻ繝ｻ*/
      --accent-green: #10b981; /* TradingView郢ｧ・ｰ郢晢ｽｪ郢晢ｽｼ郢晢ｽｳ */
      --accent-gold: #fbbf24; /* 郢晏干ﾎ樒ｹ晄ｺ倥＞郢晢｣ｰ郢ｧ・ｴ郢晢ｽｼ郢晢ｽｫ郢昴・*/
      --accent-red: #ef4444; /* TradingView郢晢ｽｬ郢昴・繝ｩ */
      --radius-lg: 12px;
      --radius-md: 8px;
      --radius-sm: 4px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
    }

    /* Layout */
    #app {
      display: flex;
      width: 100vw;
      min-height: 100vh;
      position: relative;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100;
      transition: var(--transition);
    }

    .sidebar-logo {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .logo-main {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent-teal), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: block;
    }

    .sidebar-nav {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .nav-item {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      width: 100%;
    }

    .nav-item:hover, .nav-item.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-item.active {
      border-left: 3px solid var(--accent-teal);
      background: rgba(56, 189, 248, 0.08);
      color: var(--accent-teal);
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      stroke-width: 1.5;
    }

    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 24px;
      min-height: 100vh;
      transition: var(--transition);
    }

    /* Cards & Glassmorphism */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      transition: var(--transition);
      margin-bottom: 20px;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* Tables */
    .main-table-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .table-container {
      overflow-x: auto;
      width: 100%;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .data-table th, .data-table td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-color);
    }

    .data-table th {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.2);
    }

    .data-table tbody tr {
      transition: var(--transition);
    }

    .data-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .animate-row {
      animation: fadeInRow 0.35s ease forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes fadeInRow {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-teal), var(--accent-green));
      color: #050508;
    }

    .btn-primary:hover {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-danger {
      background: rgba(239, 83, 80, 0.15);
      color: var(--accent-red);
      border: 1px solid rgba(239, 83, 80, 0.3);
    }

    .btn-danger:hover {
      background: var(--accent-red);
      color: #fff;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 11px;
    }

    /* Filter / Search Bar */
    .filter-bar-container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      background: rgba(18, 20, 32, 0.4);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 20px;
    }

    .filter-item-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-item-wrap span {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .styled-input {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      transition: var(--transition);
    }

    .styled-input:focus {
      border-color: var(--accent-teal);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
    }

    .select-wrapper {
      position: relative;
    }

    .styled-select {
      background: #111827;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 8px 32px 8px 12px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      color-scheme: dark;
      transition: var(--transition);
    }

    .styled-select option {
      background: #111827;
      color: var(--text-primary);
    }

    .styled-select:focus {
      border-color: var(--accent-teal);
    }

    .select-wrapper::after {
      content: '隨・ｽｼ';
      font-size: 8px;
      color: var(--text-secondary);
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* Toggle Switch */
    .toggle {
      width: 40px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: var(--transition);
    }

    .toggle::after {
      content: '';
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      left: 2px;
      top: 2px;
      transition: var(--transition);
    }

    .toggle.on {
      background: var(--accent-teal);
    }

    .toggle.on::after {
      left: 22px;
    }

    /* Badges & Scores */
    .dip-badge-premium {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.25);
      padding: 4px 10px;
      border-radius: 20px;
      color: var(--accent-green);
      font-weight: 700;
      font-size: 11px;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
    }

    .dip-icon-badge {
      width: 12px;
      height: 12px;
    }

    .dip-text-wrap {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .dip-text-sub {
      font-size: 8px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .ai-insight-card:hover,
    .ai-insight-card:focus-visible {
      border-color: rgba(56, 189, 248, 0.45) !important;
      background: rgba(15, 23, 42, 0.72) !important;
      transform: translateY(-1px);
      outline: none;
    }

    .score-progress-container {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .score-progress-bar {
      height: 6px;
      background: var(--accent-teal);
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
    }

    .score-progress-track {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
    }

    .score-progress-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      width: 40px;
      text-align: right;
    }

    .price-column-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .price-chart-wrap {
      width: 72px;
      height: 28px;
    }

    .price-text-wrap {
      display: flex;
      flex-direction: column;
    }

    .price-main-val {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 14px;
    }

    .price-change-val {
      font-size: 11px;
      color: var(--accent-green);
      font-weight: 600;
    }

    .price-change-val.negative {
      color: var(--accent-red);
    }

    /* Modal Styling - Bloomberg Style Premium Fullscreen (2隴ｫ螟ょｲｼ邵ｺ・ｮ鬮ｱ蛛ｵ・樒ｹ晏干ﾎ樒ｹ晄ｺ倥＞郢晢｣ｰTradingView郢昴・繝ｻ郢昴・ */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 5, 8, 0.85);
      backdrop-filter: blur(12px);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #111827; /* 雎ｼ繝ｻ・ｴ・ｺ */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-lg);
      width: 96vw;
      height: 94vh;
      max-width: 1800px;
      max-height: 1000px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease, height 0.3s ease;
    }

    .modal.normal-size {
      width: 1100px;
      height: 85vh;
    }

    .modal-close, .modal-toggle-max {
      position: absolute;
      top: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1010;
      font-size: 14px;
      transition: var(--transition);
    }

    .modal-close {
      right: 16px;
    }

    .modal-toggle-max {
      right: 56px;
    }

    .modal-close:hover, .modal-toggle-max:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--accent-teal);
    }

    .modal-company-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(0,0,0,0.25);
    }

    .modal-company-name {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(90deg, #fff, var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 4px;
    }

    .modal-body {
      display: grid;
      grid-template-columns: 1fr 480px;
      height: calc(100% - 100px);
      min-height: 0;
    }

    .modal-left {
      padding: 24px;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .modal-right {
      padding: 24px;
      background: rgba(13, 17, 28, 0.45);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .modal-chart-wrap {
      flex: 1;
      min-height: 320px;
      position: relative;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    /* Drag Handles */
    .resize-handle {
      position: absolute;
      background: transparent;
      z-index: 1005;
    }
    .resize-r { top: 0; right: 0; width: 6px; height: 100%; cursor: col-resize; }
    .resize-b { bottom: 0; left: 0; height: 6px; width: 100%; cursor: row-resize; }
    .resize-se { bottom: 0; right: 0; width: 12px; height: 12px; cursor: nwse-resize; }

    /* Gemini AI Styling */
    .gemini-pulse-loader {
      animation: neonPulse 2s infinite alternate;
    }

    @keyframes neonPulse {
      from { box-shadow: 0 0 10px rgba(56, 189, 248, 0.1), inset 0 0 10px rgba(56, 189, 248, 0.05); }
      to { box-shadow: 0 0 20px rgba(56, 189, 248, 0.3), inset 0 0 15px rgba(56, 189, 248, 0.15); }
    }

    .ai-analysis-card {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-md);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: var(--transition);
    }

    .ai-analysis-card:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(56, 189, 248, 0.2);
      transform: translateX(2px);
    }

    .ai-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Small Modal styling */
    .modal-small {
      width: 420px;
      height: auto;
      min-height: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .form-input {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      outline: none;
      font-size: 13px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }

    /* Settings specific styles */
    .settings-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 640px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .settings-label {
      display: flex;
      flex-direction: column;
    }

    .settings-label span {
      font-size: 13px;
      font-weight: 600;
    }

    .settings-desc {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .settings-section-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--accent-teal);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Toast Container */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(18, 20, 32, 0.9);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border-left: 4px solid var(--accent-teal);
      transform: translateY(20px);
      opacity: 0;
      animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes toastIn {
      to { transform: translateY(0); opacity: 1; }
    }

    .toast.success { border-left-color: var(--accent-green); }
    .toast.error { border-left-color: var(--accent-red); }
    .toast.info { border-left-color: #29b6f6; }

    /* Custom Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

    /* Mobile Adaptations */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border-color);
      z-index: 90;
      align-items: center;
      padding: 0 16px;
      justify-content: space-between;
    }

    @keyframes blink {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      body {
        display: block;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      #app {
        width: 100%;
        overflow-x: hidden;
      }
      .sidebar {
        transform: translateX(-100%);
        width: min(82vw, 300px);
        box-shadow: 20px 0 50px rgba(0, 0, 0, 0.45);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        flex: none;
        margin-left: 0;
        padding: 76px 12px 24px;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }
      .mobile-header {
        display: flex;
        justify-content: flex-start;

function buildSupplementStock([code, name, sector, description, project]) {
  const seed = parseInt(code, 10);
  const baseScore = 7.2 + (seed % 25) / 10;
  const score = Math.min(9.6, Math.round(baseScore * 10) / 10);
  const price = Math.round((900 + (seed % 170) * 45) / 10) * 10;
  const dipSignal = seed % 4 === 0 || seed % 7 === 0;
  const scores = {
    capital: Math.min(10, Math.floor(score + (seed % 3 === 0 ? 1 : 0))),
    projectImpact: Math.min(10, Math.floor(score + (project.includes('AI') || project.includes('DX') ? 1 : 0))),
    liquidity: Math.min(10, Math.floor(score + (seed % 2))),
    financial: Math.min(10, Math.floor(score + (seed % 5 === 0 ? 1 : 0))),
    earnings: Math.min(10, Math.floor(score + (seed % 4 === 0 ? 1 : 0))),
    perPbr: Math.max(6, Math.min(10, Math.floor(score) - (seed % 3 === 1 ? 1 : 0))),
    pl: Math.min(10, Math.floor(score + (seed % 6 === 0 ? 1 : 0))),
    cf: Math.min(10, Math.floor(score + (seed % 5 === 1 ? 1 : 0))),
    report: Math.min(10, Math.floor(score + (seed % 4 === 2 ? 1 : 0))),
    securities: Math.min(10, Math.floor(score + (seed % 4 === 3 ? 1 : 0)))
  };
  const priceHistory = Array.from({ length: 11 }, (_, i) => {
    const wave = Math.sin((seed % 9 + i) / 2.1) * 0.055;
    const trend = (i - 5) * 0.012;
    return Math.max(50, Math.round(price * (0.92 + wave + trend)));
  });
  return { code, name, sector, price, change: 0, score, dipSignal, targetHit: false, targetPrice: Math.round(price * 1.15), description, project, scores, priceHistory, inWatchlist: false };
}

function getDividendProfile(stock) {
  const seed = parseInt(stock.code, 10) || 1000;
  const yieldRate = 2.1 + (seed % 24) / 10;
  const annualDividend = Math.max(5, Math.round(stock.price * yieldRate / 100 / 5) * 5);
  const payoutRatio = 28 + (seed % 34);
  const growthYears = seed % 9;
  const stability = Math.min(10, Math.round((stock.scores.financial * 0.42 + stock.scores.cf * 0.32 + stock.scores.earnings * 0.26) * 10) / 10);
  const incomeScore = Math.round((yieldRate * 1.25 + stability * 0.45 + Math.min(growthYears, 6) * 0.28) * 10) / 10;
  return { yieldRate, annualDividend, payoutRatio, growthYears, stability, incomeScore };
}

  const bargainScore = Math.round((valuation * 0.95 + quality * 0.75 + dividend.yieldRate * 0.42 + benefit.benefitYield * 6 + pullback - overheatPenalty) * 10) / 10;
  const themeScore = Math.round(((stock.scores.projectImpact || 7) * 0.8 + (stock.scores.liquidity || 7) * 0.35 + stock.score * 0.45 + (theme === rankTheme ? 1.4 : 0)) * 10) / 10;
  return {
    theme,
    dividend,
    benefit,
    bargainScore,
    themeScore,
    totalYield: dividend.yieldRate + benefit.benefitYield,
  };
}

function getDiscoveryScore(stock, mode = rankDiscoveryMode) {
  const p = getDiscoveryProfile(stock);
  switch (mode) {
    case 'dividend': return p.dividend.incomeScore;
    case 'dip': return (stock.dipSignal ? 8 : 4.8) + (stock.scores.financial || 7) * 0.35 + (stock.scores.perPbr || 7) * 0.25;
    case 'benefit': return p.benefit.benefitScore;
    case 'theme': return p.themeScore;
    case 'total': return stock.score;
    default: return p.bargainScore;
  }
}

function getDiscoveryReason(stock, mode = rankDiscoveryMode) {
  const p = getDiscoveryProfile(stock);
  switch (mode) {
    case 'dividend':
      return `鬩滓ｦ奇ｽｽ繝ｻ{p.dividend.yieldRate.toFixed(2)}%邵ｲ繝ｻ繝ｻ陟匁瑳ﾂ・ｧ陷ｷ繝ｻ{p.dividend.payoutRatio}%邵ｲ竏ｬ・ｲ・｡陷阪・{p.dividend.stability.toFixed(1)}/10`;

function fp(p) { return '・ゑｽ･' + Math.round(p).toLocaleString('ja-JP'); }
function fc(c) { return (c>=0?'+':'')+c.toFixed(2)+'%'; }

function destroyCharts() {
  chartInstances.forEach(c => { try{c.destroy();}catch(e){} });
  chartInstances = [];
}

function makeLineChart(canvas, data, color) {
  if (!canvas) return null;
  const ctx = canvas.getContext('2d');
  const g = ctx.createLinearGradient(0,0,0,canvas.height||28);
  g.addColorStop(0, color+'44'); g.addColorStop(1, color+'00');
  const chart = new Chart(ctx, {
    type:'line',
    data:{ labels:data.map((_,i)=>i), datasets:[{ data, borderColor:color, borderWidth:1.5, fill:true, backgroundColor:g, tension:.4, pointRadius:0 }] },
    options:{ responsive:false, animation:{duration:500}, plugins:{legend:{display:false},tooltip:{enabled:false}}, scales:{x:{display:false},y:{display:false}} }
  });
  chartInstances.push(chart);
  return chart;
}

function renderMiniCharts() {
  requestAnimationFrame(()=>{
    document.querySelectorAll('.mini-chart-canvas[data-prices]').forEach(canvas=>{
      try {
        const prices = JSON.parse(canvas.dataset.prices);
        const color = canvas.dataset.color||'#00d4aa';
        makeLineChart(canvas, prices, color);
      } catch(e){}
    });
  });
}

function showToast(msg, type='info') {
  let c = document.querySelector('.toast-container');
  if (!c) { c=document.createElement('div'); c.className='toast-container'; document.body.appendChild(c); }
  const t = document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>{ t.style.transition='.3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}

// 郢敖郢昴・縺咏ｹ晢ｽ･郢晄㈱繝ｻ郢晄・・ｸ鄙ｫ繝ｻ關難ｽ｡隴ｬ・ｼ髯ｦ・ｨ驕会ｽｺ郢ｧ蜻域た霑夲ｽｩ邵ｺ・ｮ郢昴・繝ｻ郢ｧ・ｿ邵ｺ・ｧ鬮ｱ讒ｫ驟碑ｭ帶ｺ倪・闕ｳ鬆大ｶ檎ｸｺ閧ｴ蟲ｩ隴・ｽｰ邵ｺ蜷ｶ・九・蝓滓呵棔・ｧ5闔会ｽｶ邵ｺ・ｮ闕ｳ・ｦ陋ｻ蜉ｱ繝ｰ郢昴・繝｡陋ｻ・ｶ陟包ｽ｡繝ｻ繝ｻasync function updateDashboardPricesLive() {
  const concurrency = 5;
  const queue = [...STOCKS];
  
  async function worker() {
    while (queue.length > 0) {
      const stock = queue.shift();
      if (!stock || stock.code.length !== 4) continue;
      
      const ticker = `${stock.code}.T`;
      const yfiUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yfiUrl)}`;
      
      try {
        const res = await fetchWithTimeout(proxyUrl, {}, 2000);
        if (!res.ok) continue;
        const json = await res.json();
        const rawData = JSON.parse(json.contents);
        const result = rawData.chart.result[0];
        if (!result) continue;
        
        const latestPrice = result.meta.regularMarketPrice;
        const prevClose = result.meta.chartPreviousClose;
        if (latestPrice === undefined || prevClose === undefined) continue;
        
        const changePercent = ((latestPrice - prevClose) / prevClose) * 100;
        
        // 郢ｧ・ｰ郢晢ｽｭ郢晢ｽｼ郢晁・ﾎ晉ｹ昴・繝ｻ郢ｧ・ｿ郢ｧ蜻域た霑夲ｽｩ邵ｺ・ｧ隴厄ｽｴ隴・ｽｰ
        stock.price = latestPrice;
        stock.change = changePercent;
        
        // UI郢ｧ蝣､蟲ｩ隰暦ｽ･郢昜ｻ｣縺｡郢昜ｻ｣縺｡邵ｺ・ｨ隴厄ｽｴ隴・ｽｰ
        const row = document.querySelector(`tr[data-code="${stock.code}"]`);
        if (row) {
          const priceValEl = row.querySelector('.price-main-val');
          const priceChangeEl = row.querySelector('.price-change-val');
          if (priceValEl) priceValEl.textContent = fp(latestPrice);
          if (priceChangeEl) {
            priceChangeEl.textContent = fc(changePercent);
            priceChangeEl.classList.toggle('negative', changePercent < 0);
          }
        }
      } catch (e) {
        // 鬩輔・・ｻ・ｶ郢晢ｽｻ郢ｧ・ｿ郢ｧ・､郢晢｣ｰ郢ｧ・｢郢ｧ・ｦ郢晏沺蜃ｾ邵ｺ・ｯ騾ｶ・ｴ髴大､ｧﾂ・､郢ｧ蝣､・ｶ・ｭ隰悶・      }
    }
  }
  
  const workers = Array(concurrency).fill(null).map(() => worker());
  await Promise.all(workers);
}

      showToast(`郢ｧ・ｳ郢晢ｽｼ郢昴・${code} 邵ｺ・ｯ隴夲ｽｱ髫ｪ・ｼ邵ｺ・ｫ陝・ｼ懈Β邵ｺ蜉ｱ竊醍ｸｺ繝ｻﾂｰ邵ｲ竏晏徐陟募干縲堤ｸｺ髦ｪ竏ｪ邵ｺ蟶呻ｽ鍋ｸｺ・ｧ邵ｺ蜉ｱ笳・ｸｲ・｡, 'error');
      searchFetchBtn.disabled = false;
      searchFetchBtn.textContent = '隴夲ｽｱ髫ｪ・ｼ陷ｿ髢・ｾ繝ｻ;
    }
  });

  const dipToggle = document.getElementById('dip-toggle');
  if (dipToggle) {
    dipToggle.classList.toggle('on', rankDipOnly);
    dipToggle.closest('.dip-toggle-container')?.addEventListener('click', ()=>{
      rankDipOnly = !rankDipOnly;
      dipToggle.classList.toggle('on', rankDipOnly);
      refreshRankTable();
    });
  }
  
  refreshRankTable();
}

function refreshRankTable() {
  destroyCharts();
  let list = STOCKS.filter(s=>( (rankSector==='all'||s.sector===rankSector) && (!rankDipOnly||s.dipSignal) ));
  if (rankTheme !== 'all') {
    list = list.filter(s => getStockTheme(s) === rankTheme);
  }
  
  if (rankSearchQuery) {
    list = list.filter(s => 
      s.code.includes(rankSearchQuery) || 
      s.name.toLowerCase().includes(rankSearchQuery) ||
      s.sector.toLowerCase().includes(rankSearchQuery)
    );
  }
  
  const useDiscoverySort = rankDiscoveryMode !== 'total';
  if (useDiscoverySort) {
    list.sort((a,b)=>getDiscoveryScore(b)-getDiscoveryScore(a));
  } else {
    list.sort((a,b)=>{
      switch(rankSortBy){
        case 'score-asc': return a.score-b.score;
        case 'price-desc': return b.price-a.price;
        case 'price-asc': return a.price-b.price;
        case 'change-desc': return b.change-a.change;
        case 'change-asc': return a.change-b.change;
        case 'dip-first': return (b.dipSignal?1:0) - (a.dipSignal?1:0);
        default: return b.score-a.score;
      }
    });
  }
  list = list.slice(0, 100);
  
  const tbody = document.getElementById('rank-tbody');

  tbody.innerHTML = list.map((s,i)=>{

function exportCSV() {
  const rows=['Timestamp,Code,Name,Type,Details,Score',...signalData.map(s=>`"${s.timestamp}","${s.code}","${s.name}","${s.type}","${s.priceDetails}","${s.score||''}"`)];

  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='signals_log.csv'; a.click();
  showToast('CSV郢ｧ蛛ｵ縺顔ｹｧ・ｯ郢ｧ・ｹ郢晄亢繝ｻ郢晏現・邵ｺ・ｾ邵ｺ蜉ｱ笳・,'success');

function fetchWithTimeout(url, options = {}, timeout = 2500) {
  // 郢晄じﾎ帷ｹｧ・ｦ郢ｧ・ｶ邵ｺ・ｫ郢ｧ蛹ｻ・狗ｹ晢ｽｭ郢晢ｽｼ郢ｧ・ｫ郢晢ｽｫ郢ｧ・ｭ郢晢ｽ｣郢昴・縺咏ｹ晢ｽ･郢ｧ雋橸ｽｮ謔溘・邵ｺ・ｫ郢晁・縺・ｹ昜ｻ｣縺帷ｸｺ蜷ｶ・狗ｸｺ貅假ｽ∫ｸｺ・ｮ郢晏･繝｣郢敖郢晢ｽｼ郢ｧ螳夲ｽｿ・ｽ陷会｣ｰ
  const fetchOptions = {
    ...options,
    cache: 'no-store',
    headers: {
      ...options.headers,
      'Pragma': 'no-cache',
      'Cache-Control': 'no-cache'
    }
  };
  return Promise.race([
    fetch(url, fetchOptions),
    new Promise((_, reject) => setTimeout(() => reject(new Error('Fetch timeout')), timeout))
  ]);
}

// Yahoo Finance 騾墓ｺ倥Ι郢晢ｽｼ郢ｧ・ｿ陷ｿ髢・ｾ證ｦ・ｼ繝ｻORS郢晏干ﾎ溽ｹｧ・ｭ郢ｧ・ｷ驍ｨ讙守ｽｰ繝ｻ繝ｻ・ｺ遒√裟郢ｧ・ｵ郢晢ｽｼ郢晁・繝ｻ陷驤ｴ閨櫁峪蜴・ｽｼ繝ｻasync function fetchYahooFinanceCandles(code, timeframe) {
  const ticker = code.length === 4 ? `${code}.T` : code;
  let interval = '1d';
  let range = '1y';
  
  if (timeframe === '5m') { interval = '5m'; range = '1d'; }
  else if (timeframe === '15m') { interval = '15m'; range = '5d'; }
  else if (timeframe === '1h') { interval = '60m'; range = '1mo'; }
  else if (timeframe === '4h') { interval = '60m'; range = '3mo'; }
  else if (timeframe === '1d') { interval = '1d'; range = '5y'; }
  else if (timeframe === '1wk') { interval = '1wk'; range = '10y'; }
  else if (timeframe === '1mo') { interval = '1mo'; range = 'max'; }
  
  // query1 邵ｺ・ｨ query2 邵ｺ・ｮ闔遒√裟陋ｹ謔ｶ縲堤ｹｧ・ｵ郢晢ｽｼ郢晁・繝ｻ鬮ｫ諛ｷ・ｮ・ｳ郢晢ｽｻ郢晢ｽｬ郢晢ｽｼ郢昜ｺ･螳幃ｫｯ闊鯉ｽ定摎讓｣竏ｩ
  const endpoints = [
    `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=${interval}&range=${range}`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=${interval}&range=${range}`
  ];
  
  let lastErr = null;
  for (const yfiUrl of endpoints) {
    try {
      console.log(`Fetching candles from Yahoo Finance: ${yfiUrl}`);
      const rawData = await fetchFromYahooProxy(yfiUrl, true);
      const result = rawData.chart.result[0];
      if (!result) throw new Error("Ticker not found on Yahoo Finance");
      
      const timestamps = result.timestamp;
      const quote = result.indicators.quote[0];
      const closeData = quote.close;
      const openData = quote.open;
      const highData = quote.high;
      const lowData = quote.low;
      
      if (!timestamps || !closeData) throw new Error("No stock data returned");
      
      let candles = [];
      let seenTimes = new Set();
      for (let i = 0; i < timestamps.length; i++) {
        if (closeData[i] === null || openData[i] === null || highData[i] === null || lowData[i] === null) continue;
        
        let time;
        if (timeframe === '1d') {
          time = new Date(timestamps[i] * 1000).toISOString().split('T')[0];
        } else {
          time = timestamps[i]; // Unix timestamp (seconds) for intra-day
        }
        
        // 鬩･蟠趣ｽ､繝ｻ・邵ｺ貅倥■郢ｧ・､郢晢｣ｰ郢ｧ・ｹ郢ｧ・ｿ郢晢ｽｳ郢晏干・定包ｽｹ陟主｢楢ｳ憺ｫｯ・､
        if (seenTimes.has(time)) continue;
        seenTimes.add(time);
        
        candles.push({
          time: time,
          open: openData[i],
          high: highData[i],
          low: lowData[i],
          close: closeData[i]
        });
      }
      
      // 郢ｧ・ｿ郢ｧ・､郢晢｣ｰ郢ｧ・ｹ郢ｧ・ｿ郢晢ｽｳ郢晞斡・ｰ繝ｻ竊楢惷・ｳ陝・・竊楢ｭ上・・ｰ繝ｻ縺溽ｹ晢ｽｼ郢晏現笘・ｹｧ蜈ｷ・ｼ繝ｻightweight Charts邵ｺ・ｮ陟｢繝ｻ・ｰ莠包ｽｻ蠅難ｽｧ蛛・ｽｼ繝ｻ      candles.sort((a, b) => {
        if (typeof a.time === 'string') {
          return a.time.localeCompare(b.time);
        }
        return a.time - b.time;
      });
      
      if (candles.length === 0) throw new Error("No valid candles after cleaning");
      
      // 郢晢ｽｪ郢ｧ・｢郢晢ｽｫ郢ｧ・ｿ郢ｧ・､郢晢｣ｰ陷ｿ髢・ｾ邇ｲ繝ｻ陷画ｺ倥Ψ郢晢ｽｩ郢ｧ・ｰ郢ｧ蜑・ｽｻ蛟・ｽｸ繝ｻ      candles.isRealtime = true;
      return candles;
    } catch (err) {
      console.warn(`Attempt failed with ${yfiUrl}:`, err.message);
      lastErr = err;
    }
  }
  
  throw new Error(`All Yahoo Finance endpoints/proxies failed for ${ticker}.`, { cause: lastErr });
}

function calculateEMA(data, period) {
  let ema = [];
  if (data.length === 0) return ema;
  const k = 2 / (period + 1);
  let prevEma = data[0].close;
  
  for (let i = 0; i < data.length; i++) {
    const val = data[i].close;
    const currentEma = i === 0 ? val : val * k + prevEma * (1 - k);
    ema.push({ time: data[i].time, value: currentEma });
    prevEma = currentEma;
  }
  return ema;
}

function calculateDipSetup(candles, ema25, ema75, ema200) {
  if (!candles || candles.length < 60) {
    return { active: false, price: null, reason: '陋ｻ・､陞ｳ螢ｹ竊楢｢繝ｻ・ｦ竏壺・郢晢ｽｭ郢晢ｽｼ郢ｧ・ｽ郢ｧ・ｯ髮懶ｽｳ邵ｺ蠕｡・ｸ蟠趣ｽｶ・ｳ邵ｺ蜉ｱ窶ｻ邵ｺ繝ｻ竏ｪ邵ｺ繝ｻ };
  }

  const latest = candles[candles.length - 1];
  const previous = candles[candles.length - 2];
  const close = latest.close;
  const recent = candles.slice(-80);
  const recentStops = candles.slice(-25);
  const recentHigh = Math.max(...recent.map(c => c.high));
  const recentLow = Math.min(...recent.map(c => c.low));
  const stopLoss = Math.min(...recentStops.map(c => c.low));
  const pullbackFromHigh = recentHigh > 0 ? (recentHigh - close) / recentHigh : 0;
  const bouncedToday = latest.close > latest.open || latest.close > previous.close;
  const emaCandidates = [ema25, ema75, ema200]
    .map(series => series.length ? series[series.length - 1].value : null)
    .filter(value => value && value < close * 1.035 && value > close * 0.88);
  const swingCandidates = recent
    .slice(0, -1)
    .filter(c => c.low < close && c.low > close * 0.86)
    .map(c => c.low);
  const supports = [...emaCandidates, ...swingCandidates].sort((a, b) => b - a);
  const support = supports[0] || recentLow;
  const nearSupport = support ? Math.abs(close - support) / close <= 0.065 : false;
  const active = pullbackFromHigh >= 0.06 && nearSupport && bouncedToday;
  const supportText = support ? `隰ｾ・ｯ隰問・ﾂ蜻ｵ・｣繝ｻ${fp(support)}` : '隰ｾ・ｯ隰問・ﾂ蜻ｵ・｣諛岩・邵ｺ繝ｻ;
  const stopText = Number.isFinite(stopLoss) ? `隰ｳ讎翫・郢ｧ鬘泌ｲｼ陞ｳ蟲ｨ繝ｻ騾ｶ・ｴ髴大､ｧ・ｮ迚卍・､ ${fp(stopLoss)} 陷托ｽｲ郢ｧ蠖｢ : '隰ｳ讎翫・郢ｧ鬘泌ｲｼ陞ｳ蟲ｨ繝ｻ騾ｶ・ｴ髴大､ｧ・ｮ迚卍・､陷托ｽｲ郢ｧ繝ｻ;
  const pullbackText = `騾ｶ・ｴ髴鷹ｷｹ・ｫ莨慊・､邵ｺ荵晢ｽ蛾ｏ繝ｻ{Math.round(pullbackFromHigh * 100)}%髫ｱ・ｿ隰ｨ・ｴ`;

  return {
    active,
    price: support || null,
    reason: active
      ? `${pullbackText}邵ｲ繝ｻ{supportText}闔牙ｩ・ｿ莉｣竏ｪ邵ｺ・ｧ闕ｳ荵晢ｿ｡邵ｺ貅ｷ・ｾ蠕娯・陷ｿ蜥ｲ蛹ｱ郢ｧ蝣､・｢・ｺ髫ｱ髦ｪﾂ繝ｻ{stopText}`
      : `${pullbackText}邵ｲ繝ｻ{supportText}闔牙ｩ・ｿ莉｣ﾂ繧・ｸ夐具ｽｺ驕抵ｽｺ髫ｱ髦ｪ繝ｻ陟托ｽｱ郢ｧ竏壹・邵ｺ貅假ｽ∫ｸｲ繝ｻ{stopText}`
  };
}

function applyChartViewport(candles, timeframe) {
  if (!activeLightweightChart || !candles || candles.length === 0) return;

  const visibleBars = timeframe === '1d'
    ? 250
    : timeframe === '1wk'
      ? 156
      : timeframe === '1mo'
        ? 120
        : Math.min(candles.length, 220);
  const rightOffset = timeframe === '1d' ? 42 : 28;
  const from = Math.max(0, candles.length - visibleBars);

  activeLightweightChart.timeScale().setVisibleLogicalRange({
    from,
    to: candles.length - 1 + rightOffset
  });
}

function initResizableModal() {
  const modal = document.getElementById('stock-modal');
  if (!modal) return;
  const handles = modal.querySelectorAll('.resize-handle');
  
  handles.forEach(handle => {
    handle.addEventListener('mousedown', initDrag);
  });
  
  function initDrag(e) {
    e.preventDefault();
    const direction = e.target.dataset.direction;
    const startX = e.clientX;
    const startY = e.clientY;
    const startWidth = modal.offsetWidth;
    const startHeight = modal.offsetHeight;
    
    modal.classList.add('normal-size'); // 郢晏ｳｨﾎ帷ｹ昴・縺定ｭ弱ｅ竊馴明・ｪ陷崎ｼ斐堤ｹｧ・ｵ郢ｧ・､郢ｧ・ｺ郢晏現縺堤ｹ晢ｽｫ霑･・ｶ隲ｷ荵昶・
    document.body.style.userSelect = 'none';
    
    document.addEventListener('mousemove', doDrag);
    document.addEventListener('mouseup', stopDrag);
    
    function doDrag(ev) {
      if (direction === 'r' || direction === 'se') {
        const newWidth = startWidth + (ev.clientX - startX);
        if (newWidth > 680 && newWidth < window.innerWidth - 40) {
          modal.style.width = newWidth + 'px';
        }
      }
      if (direction === 'b' || direction === 'se') {
        const newHeight = startHeight + (ev.clientY - startY);
        if (newHeight > 500 && newHeight < window.innerHeight - 40) {
          modal.style.height = newHeight + 'px';
        }
      }
      
      if (activeLightweightChart) {
        const container = document.getElementById('detail-chart-container');
        if (container) {
          activeLightweightChart.resize(container.offsetWidth, container.offsetHeight);
        }
      }
      
      modalCharts.forEach(c => {
        try { c.resize(); } catch(err) {}
      });
    }
    
    function stopDrag() {
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', doDrag);
      document.removeEventListener('mouseup', stopDrag);
    }
  }
}

function drawScoreGauge(canvas, score) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  // 郢昴・繝ｰ郢ｧ・､郢ｧ・ｹ邵ｺ・ｮ郢晄鱒縺醍ｹｧ・ｻ郢晢ｽｫ雎育坩邏ｫ繝ｻ繝ｻPR繝ｻ蟲ｨ竊楢汞・ｾ陟｢諛奇ｼ邵ｺ・ｦ鬯ｮ蛟｡・ｲ・ｾ驍擾ｽｰ邵ｺ・ｫ隰蜀怜愛邵ｺ蜷ｶ・・  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  
  ctx.clearRect(0, 0, rect.width, rect.height);
  
  const cx = rect.width / 2;
  const cy = rect.height - 2; // 闕ｳ迢暦ｽｫ・ｯ邵ｺ荵晢ｽ芽氣莉｣・雎ｬ・ｮ邵ｺ荵昶雷郢ｧ繝ｻ  const r = rect.width / 2 - 8;
  
  // 髢ｭ譴ｧ蜍ｹ郢ｧ・｢郢晢ｽｼ郢ｧ・ｯ (霓｣・ｰ豼ｶ・ｲ邵ｺ・ｮ髢ｭ譴ｧ蜍ｹ髴・｢・ｼ・
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)'; // 2隴ｫ螟ょｲｼ邵ｺ・ｮ騾包ｽｻ陷剃ｸ翫・郢ｧ・ｰ郢晢ｽｬ郢晢ｽｼ邵ｺ・ｫ髴台ｻ｣・樊ｿｶ・ｲ髫ｱ・ｿ
  ctx.lineWidth = 6;
  ctx.stroke();
  
  // 郢ｧ・ｹ郢ｧ・ｳ郢ｧ・｢邵ｺ・ｫ陜難ｽｺ邵ｺ・･邵ｺ荳橸ｽ｡蜉ｱ・顔ｸｺ・､邵ｺ・ｶ邵ｺ蜉ｱ縺・ｹ晢ｽｼ郢ｧ・ｯ (驍ｯ・ｺ魄怜干竊醍ｹｧ・ｨ郢晢ｽ｡郢晢ｽｩ郢晢ｽｫ郢晏ｳｨ縺堤ｹ晢ｽｪ郢晢ｽｼ郢晢ｽｳ陷雁ｩ迚｡)
  const scorePercent = Math.min(Math.max(score / 10, 0), 1);
  const endAngle = Math.PI + (Math.PI * scorePercent);
  
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, endAngle);
  ctx.strokeStyle = '#10b981'; // 2隴ｫ螟ょｲｼ邵ｺ・ｮ騾包ｽｻ陷剃ｸ岩・陞ｳ謔溘・邵ｺ・ｫ陷ｷ驛√・邵ｺ蜷ｶ・矩ｭ・ｽｮ郢ｧ繝ｻﾂｰ邵ｺ・ｪ郢ｧ・ｰ郢晢ｽｪ郢晢ｽｼ郢晢ｽｳ
  ctx.lineWidth = 6;
  ctx.stroke();
  
  // 鬩･繝ｻ(郢晢ｽ｡郢晢ｽｼ郢ｧ・ｿ郢晢ｽｼ邵ｺ・ｮ鬩･繝ｻ- 髫苓ｲ橸ｽｺ・ｦ0邵ｺ讙取ｄ陷ｿ・ｳ邵ｺ・ｪ邵ｺ・ｮ邵ｺ・ｧrotate(endAngle)邵ｺ・ｧ郢敖郢ｧ・､郢晢ｽｬ郢ｧ・ｯ郢晏現竊楢楜讙取倦邵ｺ・ｪ隴・ｽｹ陷ｷ莉｣・定ｬ悶・・邵ｺ・ｾ邵ｺ繝ｻ
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(endAngle);
  ctx.beginPath();
  ctx.moveTo(0, -2);
  ctx.lineTo(r - 4, 0); // 陷郁ご・ｫ・ｯ郢ｧ蛛ｵ縺咏ｹ晢ｽ｣郢晢ｽｼ郢晏干竊鍋ｸｺ蜉ｱ笳・・蠑ｱ・邵ｺ繝ｻ蜊邵ｺ繝ｻ谺鬩･繝ｻ  ctx.lineTo(0, 2);
  ctx.closePath();
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.restore();
  
  // 闕ｳ・ｭ陟｢繝ｻ繝ｴ郢晢ｽｳ
  ctx.beginPath();
  ctx.arc(cx, cy, 3.5, 0, 2 * Math.PI);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
}

function buildDetailChart(stock, timeframe = '1d') {
  const container = document.getElementById('detail-chart-container');
  if (!container) return;
  
  const initWidth = container.clientWidth || 550;
  const initHeight = container.clientHeight || 380;
  
  const chart = LightweightCharts.createChart(container, {
    width: initWidth,
    height: initHeight,
    layout: {
      background: { color: 'rgba(0,0,0,0)' },
      textColor: '#94a3b8',
    },
    grid: {
      vertLines: { color: 'rgba(255, 255, 255, 0.04)' },
      horzLines: { color: 'rgba(255, 255, 255, 0.04)' },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: 'rgba(56, 189, 248, 0.4)', width: 1, style: 3 },
      horzLine: { color: 'rgba(56, 189, 248, 0.4)', width: 1, style: 3 },
    },
    rightPriceScale: { borderColor: 'rgba(255, 255, 255, 0.08)' },
    timeScale: {
      borderColor: 'rgba(255, 255, 255, 0.08)',
      timeVisible: timeframe !== '1d',
      rightOffset: 42,
      barSpacing: 5.5,
    },
    handleScroll: true,
    handleScale: true,
  });
  
  const candlestickSeries = chart.addCandlestickSeries({
    upColor: '#10b981',
    downColor: '#ef4444',
    borderVisible: false,
    wickUpColor: '#10b981',
    wickDownColor: '#ef4444',
  });
  
  const ema25Series = chart.addLineSeries({ color: '#29b6f6', lineWidth: 1.2, priceLineVisible: false, lastValueVisible: false });
  const ema75Series = chart.addLineSeries({ color: '#ffa726', lineWidth: 1.2, priceLineVisible: false, lastValueVisible: false });
  const ema200Series = chart.addLineSeries({ color: '#ec407a', lineWidth: 1.2, priceLineVisible: false, lastValueVisible: false });
  
  activeLightweightChart = chart;
  activeCandleSeries = candlestickSeries;
  activeEma25Series = ema25Series;
  activeEma75Series = ema75Series;
  activeEma200Series = ema200Series;
  
  updateChartTimeframe(stock, timeframe);
}

async function updateChartTimeframe(stock, timeframe) {
  if (!activeLightweightChart || !activeCandleSeries) return;

  const chartTitleEl = document.getElementById('modal-chart-title');
  const badge = document.getElementById('chart-dip-badge');
  const status = document.getElementById('modal-status-text');
  const statusDot = document.getElementById('modal-status-dot');
  const statusBox = document.getElementById('modal-status-box');

  try {
    const candles = await fetchYahooFinanceCandles(stock.code, timeframe);
    activeChartCandles = candles;
    activeChartTimeframe = timeframe;

    if (chartTitleEl) {
      chartTitleEl.innerHTML = `笆 譬ｪ萓｡繝√Ε繝ｼ繝・- <span style="color: var(--accent-green); font-weight: 700;">譚ｱ險ｼ繝ｪ繧｢繝ｫ繧ｿ繧､繝</span>`;
    }

    const ema25 = calculateEMA(candles, 25);
    const ema75 = calculateEMA(candles, 75);
    const ema200 = calculateEMA(candles, 200);

    activeCandleSeries.setData(candles);
    activeEma25Series.setData(ema25);
    activeEma75Series.setData(ema75);
    activeEma200Series.setData(ema200);

    if (activeCandleSeries._dipPriceLine) {
      try {
        activeCandleSeries.removePriceLine(activeCandleSeries._dipPriceLine);
      } catch (e) {}
      activeCandleSeries._dipPriceLine = null;
    }

    const dipSetup = calculateDipSetup(candles, ema25, ema75, ema200);
    const visibleDipSetup = {
      ...dipSetup,
      active: stock.dipSignal || dipSetup.active,
      reason: stock.dipSignal && !dipSetup.active ? `謚ｼ縺礼岼蛟呵｣・${dipSetup.reason}` : dipSetup.reason
    };
    syncDipSignalUi(visibleDipSetup);

    if (visibleDipSetup.active && visibleDipSetup.price) {
      const dipPrice = visibleDipSetup.price;
      activeCandleSeries._dipPriceLine = activeCandleSeries.createPriceLine({
        price: dipPrice,
        color: '#10b981',
        lineWidth: 1.5,
        lineStyle: 2,
        axisLabelVisible: true,
        title: '謚ｼ縺礼岼蛟呵｣・' + Math.round(dipPrice).toLocaleString()
      });
    }

    const latestCandle = candles[candles.length - 1];
    if (latestCandle) {
      const currentPrice = latestCandle.close;
      const priceLabel = document.getElementById('chart-legend-price');
      if (priceLabel) priceLabel.textContent = fp(currentPrice);
    }

    updateEmaLegend(
      ema25.length > 0 ? ema25[ema25.length - 1].value : null,
      ema75.length > 0 ? ema75[ema75.length - 1].value : null,
      ema200.length > 0 ? ema200[ema200.length - 1].value : null
    );

    activeLightweightChart.subscribeCrosshairMove(param => {
      if (param.time) {
        const candleData = param.seriesData.get(activeCandleSeries);
        const ema25Val = param.seriesData.get(activeEma25Series);
        const ema75Val = param.seriesData.get(activeEma75Series);
        const ema200Val = param.seriesData.get(activeEma200Series);

        if (candleData) {
          const priceLabel = document.getElementById('chart-legend-price');
          if (priceLabel) priceLabel.textContent = fp(candleData.close);
        }

        updateEmaLegend(
          ema25Val ? ema25Val.value : null,
          ema75Val ? ema75Val.value : null,
          ema200Val ? ema200Val.value : null
        );
      } else {
        updateEmaLegend(
          ema25.length > 0 ? ema25[ema25.length - 1].value : null,
          ema75.length > 0 ? ema75[ema75.length - 1].value : null,
          ema200.length > 0 ? ema200[ema200.length - 1].value : null
        );
      }
    });

    const container = document.getElementById('detail-chart-container');
    if (container) {
      const w = container.offsetWidth || 550;
      const h = container.offsetHeight || 380;
      activeLightweightChart.resize(w, h);
    }
    applyChartViewport(candles, timeframe);
  } catch (err) {
    console.error('Failed to load live chart data:', err);
    activeChartCandles = [];
    if (chartTitleEl) {
      chartTitleEl.innerHTML = `笆 譬ｪ萓｡繝√Ε繝ｼ繝・- <span style="color: var(--accent-red); font-weight: 700;">螳溘ョ繝ｼ繧ｿ蜿門ｾ怜､ｱ謨・/span>`;
    }
    if (badge) badge.style.display = 'none';
    if (status) status.textContent = '繧ｹ繝・・繧ｿ繧ｹ: 螳溘ョ繝ｼ繧ｿ縺ｮ蜿門ｾ励↓螟ｱ謨励＠縺ｾ縺励◆';
    if (statusDot) statusDot.style.backgroundColor = 'var(--accent-red)';
    if (statusBox) {
      statusBox.style.borderColor = 'rgba(239, 68, 68, 0.3)';
      statusBox.style.background = 'rgba(239, 68, 68, 0.08)';
      statusBox.style.color = 'var(--accent-red)';
    }
    activeCandleSeries.setData([]);
    activeEma25Series.setData([]);
    activeEma75Series.setData([]);
    activeEma200Series.setData([]);
    updateEmaLegend(null, null, null);
  }
}

function updateEmaLegend(ema25, ema75, ema200) {
  const e25El = document.getElementById('legend-ema25');
  const e75El = document.getElementById('legend-ema75');
  const e200El = document.getElementById('legend-ema200');
  
  if (e25El) e25El.textContent = ema25 !== null ? Math.round(ema25).toLocaleString('ja-JP') : '-';
  if (e75El) e75El.textContent = ema75 !== null ? Math.round(ema75).toLocaleString('ja-JP') : '-';
  if (e200El) e200El.textContent = ema200 !== null ? Math.round(ema200).toLocaleString('ja-JP') : '-';
}

function buildRadar(stock) {
  const canvas = document.getElementById('radar-c');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const labels = ['髮峨・謔ｽ鬩･繝ｻ,'Pj.Impact','雎ｬ竏晁劒隲､・ｧ','髮具ｽ｡陷榊雀笆ｼ陷茨ｽｨ','陷ｿ螳亥ｯ｢陷峨・,'PER郢晢ｽｻPBR','PL','CF','陜怜ｸ幢ｽｭ・｣陜｣・ｱ','髫ｪ・ｼ陋ｻ・ｸ'];
  const vals = Object.values(stock.scores);
  const g = ctx.createRadialGradient(110,85,0,110,85,85);
  g.addColorStop(0,'rgba(2,132,199,0.25)'); 
  g.addColorStop(1,'rgba(16,185,129,0.05)');
  
  const c = new Chart(ctx,{
    type:'radar',
    data:{ labels, datasets:[{ data:vals, borderColor:'#10b981', borderWidth:2, backgroundColor:g, pointBackgroundColor:'#0284c7', pointRadius:2.5 }] },
    options:{ 
      responsive:false, 
      animation:{duration:700}, 
      plugins:{legend:{display:false}},
      scales:{ r:{ min:0, max:10, grid:{color:'rgba(255,255,255,0.06)'}, angleLines:{color:'rgba(255,255,255,0.05)'}, pointLabels:{color:'#8892a4',font:{size:8}}, ticks:{display:false,stepSize:2} } }
    }
  });
  modalCharts.push(c);
}

// ============================================
// ROUTER & NAVIGATION
// ============================================
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  destroyCharts();
  const main = document.getElementById('main-content');
  switch(page) {
    case 'ranking':  main.innerHTML=renderRanking();  initRanking();   break;
    case 'watchlist':main.innerHTML=renderWatchlist();initWatchlist(); break;
    case 'signals':  main.innerHTML=renderSignals();  initSignals();   break;
    case 'dividends': main.innerHTML=renderIncomeRanking('dividend'); initDividendRanking(); break;
    case 'benefits': main.innerHTML=renderIncomeRanking('benefit'); initBenefitRanking(); break;
    case 'settings': main.innerHTML=renderSettings(); initSettings(); break;
  }
}
